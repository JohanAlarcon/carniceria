# Carnicería B2B — stack de producción
#
# Puertos publicados (host): app 8090->80, reverb 8091->8080. La interfaz de
# publicación es configurable con WEB_BIND / REVERB_BIND (por defecto 0.0.0.0):
#   - Acceso directo por IP  -> dejar 0.0.0.0 (default).
#   - Detrás de un reverse proxy (Apache/cPanel) -> poner 127.0.0.1 en el .env,
#     así el contenedor solo es accesible por el proxy local, nunca desde internet.
# La base de datos NUNCA se publica (solo vive en la red interna del proyecto).

name: carniceria

services:
  db:
    image: mysql:8.0
    container_name: carniceria_db
    restart: unless-stopped
    command:
      - --innodb-buffer-pool-size=256M
      - --performance-schema=OFF
      - --max-connections=50
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-carniceria}"
      MYSQL_USER: "${DB_USERNAME:-carniceria}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    mem_limit: 640m
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    networks:
      - carniceria

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: carniceria-app:latest
    container_name: carniceria_app
    restart: unless-stopped
    env_file: .env
    environment:
      RUN_MIGRATIONS: "true"
      RUN_SEED: "${RUN_SEED:-false}"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${WEB_BIND:-0.0.0.0}:8090:80"
    volumes:
      - storage:/var/www/html/storage
    mem_limit: 512m
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    networks:
      - carniceria

  queue:
    image: carniceria-app:latest
    container_name: carniceria_queue
    restart: unless-stopped
    env_file: .env
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    depends_on:
      db:
        condition: service_healthy
      app:
        condition: service_started
    volumes:
      - storage:/var/www/html/storage
    mem_limit: 256m
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    networks:
      - carniceria

  reverb:
    image: carniceria-app:latest
    container_name: carniceria_reverb
    restart: unless-stopped
    env_file: .env
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    depends_on:
      app:
        condition: service_started
    ports:
      - "${REVERB_BIND:-0.0.0.0}:8091:8080"
    mem_limit: 256m
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    networks:
      - carniceria

volumes:
  dbdata:
  storage:

networks:
  carniceria:
    driver: bridge
