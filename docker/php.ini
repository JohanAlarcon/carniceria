; Production PHP overrides for the Carnicería app
memory_limit = 512M
upload_max_filesize = 20M
post_max_size = 25M
max_execution_time = 120
expose_php = Off

; OPcache — validated timestamps kept on so a container restart always
; picks up freshly generated config/route caches without surprises.
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2
