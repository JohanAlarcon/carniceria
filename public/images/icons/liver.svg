<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="g_liver_main" cx="42%" cy="38%" r="58%" fx="35%" fy="30%">
      <stop offset="0%" stop-color="#c0334a"/>
      <stop offset="30%" stop-color="#8b1a2a"/>
      <stop offset="65%" stop-color="#5e0f1c"/>
      <stop offset="100%" stop-color="#3a0810"/>
    </radialGradient>
    <radialGradient id="g_liver_shine" cx="38%" cy="28%" r="40%">
      <stop offset="0%" stop-color="#e8566a" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#a02035" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#5e0f1c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g_liver_shadow" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#3a0810" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1a0408" stop-opacity="0.65"/>
    </linearGradient>
    <radialGradient id="g_liver_edge" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#3a0810" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1a0408" stop-opacity="0.55"/>
    </radialGradient>
    <linearGradient id="g_liver_vein1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6b1220"/>
      <stop offset="100%" stop-color="#3a0810"/>
    </linearGradient>
    <radialGradient id="g_liver_lobe" cx="60%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#b02d42"/>
      <stop offset="100%" stop-color="#4a0c18"/>
    </radialGradient>
  </defs>

  <!-- Lobulo derecho (mas grande) -->
  <path d="M64 18 C48 14, 22 20, 14 36 C8 48, 10 62, 16 74 C22 86, 34 96, 50 100 C62 103, 76 101, 86 95 C96 89, 102 80, 104 70 C108 58, 106 44, 98 34 C90 24, 78 20, 64 18 Z" fill="url(#g_liver_main)"/>

  <!-- Lobulo izquierdo (mas pequeno, parte derecha inferior) -->
  <path d="M86 95 C96 89, 106 82, 112 72 C118 62, 116 50, 110 44 C104 38, 96 38, 90 42 C96 52, 100 64, 98 76 C97 84, 92 90, 86 95 Z" fill="url(#g_liver_lobe)"/>

  <!-- Capa de profundidad/sombra base -->
  <path d="M64 18 C48 14, 22 20, 14 36 C8 48, 10 62, 16 74 C22 86, 34 96, 50 100 C62 103, 76 101, 86 95 C96 89, 102 80, 104 70 C108 58, 106 44, 98 34 C90 24, 78 20, 64 18 Z" fill="url(#g_liver_shadow)"/>

  <!-- Borde oscuro de definicion -->
  <path d="M64 18 C48 14, 22 20, 14 36 C8 48, 10 62, 16 74 C22 86, 34 96, 50 100 C62 103, 76 101, 86 95 C96 89, 102 80, 104 70 C108 58, 106 44, 98 34 C90 24, 78 20, 64 18 Z" fill="none" stroke="#2a0608" stroke-width="2.2" stroke-linejoin="round"/>
  <path d="M86 95 C96 89, 106 82, 112 72 C118 62, 116 50, 110 44 C104 38, 96 38, 90 42 C96 52, 100 64, 98 76 C97 84, 92 90, 86 95 Z" fill="none" stroke="#2a0608" stroke-width="1.8"/>

  <!-- Venas / textura interna - lineas oscuras sutiles -->
  <path d="M38 42 C48 52, 55 64, 52 80" fill="none" stroke="#4a0c18" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <path d="M52 36 C58 50, 60 66, 58 84" fill="none" stroke="#4a0c18" stroke-width="1.4" stroke-linecap="round" opacity="0.6"/>
  <path d="M68 28 C72 44, 74 62, 70 80" fill="none" stroke="#4a0c18" stroke-width="1.3" stroke-linecap="round" opacity="0.5"/>
  <path d="M30 58 C44 62, 62 64, 78 60" fill="none" stroke="#4a0c18" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
  <path d="M22 46 C34 56, 40 68, 36 82" fill="none" stroke="#3a0810" stroke-width="1.0" stroke-linecap="round" opacity="0.5"/>
  <path d="M80 40 C86 54, 88 68, 84 82" fill="none" stroke="#4a0c18" stroke-width="1.1" stroke-linecap="round" opacity="0.45"/>

  <!-- Brillo especular principal -->
  <ellipse cx="46" cy="36" rx="22" ry="13" fill="url(#g_liver_shine)" transform="rotate(-18, 46, 36)"/>

  <!-- Reflejo secundario pequeno -->
  <ellipse cx="34" cy="48" rx="8" ry="5" fill="#e8566a" fill-opacity="0.22" transform="rotate(-12, 34, 48)"/>

  <!-- Punto de brillo brillante -->
  <ellipse cx="40" cy="32" rx="7" ry="4" fill="white" fill-opacity="0.18" transform="rotate(-20, 40, 32)"/>

  <!-- Sombra de borde suave (vignette) -->
  <path d="M64 18 C48 14, 22 20, 14 36 C8 48, 10 62, 16 74 C22 86, 34 96, 50 100 C62 103, 76 101, 86 95 C96 89, 102 80, 104 70 C108 58, 106 44, 98 34 C90 24, 78 20, 64 18 Z" fill="url(#g_liver_edge)"/>
</svg>