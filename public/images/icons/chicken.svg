<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="g_chicken_body" cx="45%" cy="45%" r="55%" fx="35%" fy="35%">
      <stop offset="0%" stop-color="#FFF8E7"/>
      <stop offset="40%" stop-color="#F5E6C8"/>
      <stop offset="80%" stop-color="#E8D0A0"/>
      <stop offset="100%" stop-color="#C9B07A"/>
    </radialGradient>
    <radialGradient id="g_chicken_wing" cx="40%" cy="35%" r="60%" fx="30%" fy="25%">
      <stop offset="0%" stop-color="#F0E2C0"/>
      <stop offset="50%" stop-color="#DEC99A"/>
      <stop offset="100%" stop-color="#BFA070"/>
    </radialGradient>
    <linearGradient id="g_chicken_crest" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF4444"/>
      <stop offset="50%" stop-color="#E02020"/>
      <stop offset="100%" stop-color="#AA1010"/>
    </linearGradient>
    <linearGradient id="g_chicken_wattle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF5555"/>
      <stop offset="100%" stop-color="#CC1515"/>
    </linearGradient>
    <linearGradient id="g_chicken_beak" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFAA33"/>
      <stop offset="100%" stop-color="#CC7700"/>
    </linearGradient>
    <radialGradient id="g_chicken_eye" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#555555"/>
      <stop offset="60%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="g_chicken_tail" cx="60%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#EDD8A8"/>
      <stop offset="70%" stop-color="#C8AA70"/>
      <stop offset="100%" stop-color="#A08050"/>
    </radialGradient>
    <linearGradient id="g_chicken_leg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFBB44"/>
      <stop offset="100%" stop-color="#CC8800"/>
    </linearGradient>
    <radialGradient id="g_chicken_shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C8A870" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#8B6030" stop-opacity="0.35"/>
    </radialGradient>
  </defs>

  <!-- Tail feathers -->
  <ellipse cx="93" cy="58" rx="18" ry="10" fill="url(#g_chicken_tail)" transform="rotate(-30 93 58)" stroke="#9A7040" stroke-width="0.6"/>
  <ellipse cx="96" cy="52" rx="15" ry="8" fill="url(#g_chicken_tail)" transform="rotate(-50 96 52)" stroke="#9A7040" stroke-width="0.5"/>
  <ellipse cx="90" cy="63" rx="14" ry="7" fill="url(#g_chicken_tail)" transform="rotate(-15 90 63)" stroke="#9A7040" stroke-width="0.5"/>

  <!-- Wing -->
  <ellipse cx="60" cy="70" rx="22" ry="14" fill="url(#g_chicken_wing)" transform="rotate(-10 60 70)" stroke="#AA8850" stroke-width="0.8"/>
  <!-- Wing highlight -->
  <ellipse cx="54" cy="65" rx="10" ry="6" fill="#FFF5DC" fill-opacity="0.5" transform="rotate(-10 54 65)"/>
  <!-- Wing feather lines -->
  <path d="M45 72 Q58 68 75 73" stroke="#BFA070" stroke-width="0.8" fill="none"/>
  <path d="M46 76 Q59 72 74 77" stroke="#BFA070" stroke-width="0.8" fill="none"/>

  <!-- Main body -->
  <ellipse cx="62" cy="72" rx="30" ry="26" fill="url(#g_chicken_body)" stroke="#B09060" stroke-width="1.2"/>
  <!-- Body shadow overlay -->
  <ellipse cx="62" cy="72" rx="30" ry="26" fill="url(#g_chicken_shadow)"/>

  <!-- Neck -->
  <ellipse cx="42" cy="57" rx="12" ry="16" fill="url(#g_chicken_body)" stroke="#B09060" stroke-width="0.8"/>
  <!-- Neck highlight -->
  <ellipse cx="39" cy="52" rx="5" ry="7" fill="#FFFCF0" fill-opacity="0.45"/>

  <!-- Head -->
  <circle cx="36" cy="42" r="16" fill="url(#g_chicken_body)" stroke="#B09060" stroke-width="1.2"/>
  <!-- Head highlight -->
  <ellipse cx="30" cy="36" rx="6" ry="5" fill="#FFFDF5" fill-opacity="0.5"/>

  <!-- Crest / Cresta roja -->
  <path d="M28 28 Q25 20 30 18 Q32 24 35 20 Q36 14 40 16 Q39 22 43 20 Q44 26 40 28 Z" fill="url(#g_chicken_crest)" stroke="#880000" stroke-width="0.7"/>

  <!-- Wattle / Papada -->
  <ellipse cx="26" cy="50" rx="5" ry="7" fill="url(#g_chicken_wattle)" stroke="#AA0000" stroke-width="0.6"/>

  <!-- Eye -->
  <circle cx="30" cy="40" r="4.5" fill="white" stroke="#555" stroke-width="0.5"/>
  <circle cx="30" cy="40" r="3" fill="url(#g_chicken_eye)"/>
  <circle cx="28.8" cy="38.8" r="1" fill="white" fill-opacity="0.8"/>

  <!-- Beak -->
  <path d="M21 44 L14 41 L21 47 Z" fill="url(#g_chicken_beak)" stroke="#BB6600" stroke-width="0.7"/>

  <!-- Legs -->
  <path d="M50 94 L47 108 M47 108 L42 112 M47 108 L48 113 M47 108 L52 114" stroke="url(#g_chicken_leg1)" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M65 96 L62 110 M62 110 L57 114 M62 110 L63 115 M62 110 L67 116" stroke="url(#g_chicken_leg1)" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Body texture lines -->
  <path d="M38 75 Q50 70 65 75" stroke="#D4B880" stroke-width="0.6" fill="none" stroke-opacity="0.7"/>
  <path d="M40 82 Q52 77 68 82" stroke="#D4B880" stroke-width="0.6" fill="none" stroke-opacity="0.7"/>
</svg>