<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g_bone_main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f2ead9"/>
      <stop offset="40%" stop-color="#e0d0b4"/>
      <stop offset="100%" stop-color="#c4a980"/>
    </linearGradient>
    <radialGradient id="g_bone_knob1" cx="35%" cy="30%" r="62%">
      <stop offset="0%" stop-color="#f4ecdb"/>
      <stop offset="60%" stop-color="#e0d0b4"/>
      <stop offset="100%" stop-color="#c4a980"/>
    </radialGradient>
    <radialGradient id="g_bone_knob2" cx="35%" cy="30%" r="62%">
      <stop offset="0%" stop-color="#f4ecdb"/>
      <stop offset="60%" stop-color="#e0d0b4"/>
      <stop offset="100%" stop-color="#c4a980"/>
    </radialGradient>
    <radialGradient id="g_bone_knob3" cx="35%" cy="30%" r="62%">
      <stop offset="0%" stop-color="#f4ecdb"/>
      <stop offset="60%" stop-color="#e0d0b4"/>
      <stop offset="100%" stop-color="#c4a980"/>
    </radialGradient>
    <radialGradient id="g_bone_knob4" cx="35%" cy="30%" r="62%">
      <stop offset="0%" stop-color="#f4ecdb"/>
      <stop offset="60%" stop-color="#e0d0b4"/>
      <stop offset="100%" stop-color="#c4a980"/>
    </radialGradient>
    <radialGradient id="g_bone_marrow" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#f2ead9"/>
      <stop offset="50%" stop-color="#e3cdba"/>
      <stop offset="100%" stop-color="#c6ab81"/>
    </radialGradient>
    <linearGradient id="g_bone_shaft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eee2ca"/>
      <stop offset="50%" stop-color="#d8c39c"/>
      <stop offset="100%" stop-color="#c4a980"/>
    </linearGradient>
    <radialGradient id="g_bone_sheen" cx="38%" cy="30%" r="42%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g_bone_vignette" cx="50%" cy="45%" r="58%">
      <stop offset="62%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#3d2f16" stop-opacity="0.28"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.0"/>
    </filter>
    <clipPath id="clip_shaft">
      <rect x="42" y="48" width="44" height="22" rx="11" ry="11" transform="rotate(-40, 64, 59)"/>
    </clipPath>
  </defs>

  <!-- Sombra suave del hueso -->
  <g opacity="0.18">
    <ellipse cx="66" cy="100" rx="38" ry="7" fill="#7A5C1E"/>
  </g>

  <!-- Shaft del hueso diagonal (cuerpo central) -->
  <!-- Contorno oscuro -->
  <rect x="42" y="48" width="44" height="22" rx="11" ry="11"
        transform="rotate(-40, 64, 59)"
        fill="#9a8555" stroke="#6f5a2e" stroke-width="1.5"/>
  <!-- Relleno con gradiente -->
  <rect x="42" y="48" width="44" height="22" rx="11" ry="11"
        transform="rotate(-40, 64, 59)"
        fill="url(#g_bone_shaft)"/>
  <!-- Marmoleo/porosidad suave del hueso, recortada al shaft -->
  <g clip-path="url(#clip_shaft)" filter="url(#soft)" opacity="0.45">
    <ellipse cx="52" cy="70" rx="8" ry="4" transform="rotate(-40, 52, 70)" fill="#cbb488"/>
    <ellipse cx="74" cy="50" rx="7" ry="3.5" transform="rotate(-40, 74, 50)" fill="#d8c8a4"/>
    <ellipse cx="60" cy="60" rx="6" ry="3" transform="rotate(-40, 60, 60)" fill="#efe4cf"/>
  </g>
  <!-- Sheen mate muy sutil en el shaft -->
  <rect x="42" y="48" width="44" height="22" rx="11" ry="11"
        transform="rotate(-40, 64, 59)"
        fill="url(#g_bone_sheen)"/>
  <!-- Vignette del shaft -->
  <rect x="42" y="48" width="44" height="22" rx="11" ry="11"
        transform="rotate(-40, 64, 59)"
        fill="url(#g_bone_vignette)"/>

  <!-- Extremo superior-izquierdo: 2 bolitas -->
  <!-- Bola sup-izq A -->
  <circle cx="31" cy="30" r="14" fill="#9a8555" stroke="#6f5a2e" stroke-width="1.2"/>
  <circle cx="31" cy="30" r="14" fill="url(#g_bone_knob1)"/>
  <circle cx="31" cy="30" r="14" fill="url(#g_bone_vignette)"/>
  <ellipse cx="27" cy="26" rx="5" ry="3.5" fill="#ffffff" opacity="0.14" transform="rotate(-20,27,26)"/>

  <!-- Bola sup-izq B -->
  <circle cx="44" cy="20" r="13" fill="#9a8555" stroke="#6f5a2e" stroke-width="1.2"/>
  <circle cx="44" cy="20" r="13" fill="url(#g_bone_knob2)"/>
  <circle cx="44" cy="20" r="13" fill="url(#g_bone_vignette)"/>
  <ellipse cx="40" cy="16" rx="4.5" ry="3" fill="#ffffff" opacity="0.14" transform="rotate(-20,40,16)"/>

  <!-- Extremo inferior-derecho: 2 bolitas -->
  <!-- Bola inf-der A -->
  <circle cx="97" cy="98" r="14" fill="#9a8555" stroke="#6f5a2e" stroke-width="1.2"/>
  <circle cx="97" cy="98" r="14" fill="url(#g_bone_knob3)"/>
  <circle cx="97" cy="98" r="14" fill="url(#g_bone_vignette)"/>
  <ellipse cx="93" cy="94" rx="5" ry="3.5" fill="#ffffff" opacity="0.14" transform="rotate(-20,93,94)"/>

  <!-- Bola inf-der B -->
  <circle cx="84" cy="108" r="13" fill="#9a8555" stroke="#6f5a2e" stroke-width="1.2"/>
  <circle cx="84" cy="108" r="13" fill="url(#g_bone_knob4)"/>
  <circle cx="84" cy="108" r="13" fill="url(#g_bone_vignette)"/>
  <ellipse cx="80" cy="104" rx="4.5" ry="3" fill="#ffffff" opacity="0.14" transform="rotate(-20,80,104)"/>

  <!-- Tuetano en el centro del hueso (seccion transversal) -->
  <!-- Contorno tuetano -->
  <ellipse cx="64" cy="62" rx="8" ry="8"
           transform="rotate(-40, 64, 62)"
           fill="#9a8555" stroke="#6f5030" stroke-width="1"/>
  <!-- Tuetano con gradiente calido -->
  <ellipse cx="64" cy="62" rx="8" ry="8"
           transform="rotate(-40, 64, 62)"
           fill="url(#g_bone_marrow)"/>
  <!-- Sheen mate muy sutil del tuetano -->
  <ellipse cx="61" cy="59" rx="3" ry="2"
           transform="rotate(-40, 61, 59)"
           fill="#ffffff" opacity="0.14"/>

  <!-- Detalle: anillo de tuetano secundario -->
  <ellipse cx="64" cy="62" rx="10.5" ry="10.5"
           transform="rotate(-40, 64, 62)"
           fill="none" stroke="#b89a6a" stroke-width="1.2" stroke-dasharray="2,2" opacity="0.4"/>
</svg>
