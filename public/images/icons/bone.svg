<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g_bone_main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E6C8"/>
      <stop offset="40%" stop-color="#EDD9A3"/>
      <stop offset="100%" stop-color="#C8A96E"/>
    </linearGradient>
    <radialGradient id="g_bone_knob1" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FAF0D7"/>
      <stop offset="60%" stop-color="#E8CC8A"/>
      <stop offset="100%" stop-color="#B8944A"/>
    </radialGradient>
    <radialGradient id="g_bone_knob2" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FAF0D7"/>
      <stop offset="60%" stop-color="#E8CC8A"/>
      <stop offset="100%" stop-color="#B8944A"/>
    </radialGradient>
    <radialGradient id="g_bone_knob3" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FAF0D7"/>
      <stop offset="60%" stop-color="#E8CC8A"/>
      <stop offset="100%" stop-color="#B8944A"/>
    </radialGradient>
    <radialGradient id="g_bone_knob4" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FAF0D7"/>
      <stop offset="60%" stop-color="#E8CC8A"/>
      <stop offset="100%" stop-color="#B8944A"/>
    </radialGradient>
    <radialGradient id="g_bone_marrow" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFF3DC"/>
      <stop offset="50%" stop-color="#F5D98A"/>
      <stop offset="100%" stop-color="#D4A030"/>
    </radialGradient>
    <linearGradient id="g_bone_shaft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0DFB0"/>
      <stop offset="50%" stop-color="#D9B96B"/>
      <stop offset="100%" stop-color="#BF9840"/>
    </linearGradient>
    <linearGradient id="g_bone_highlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Sombra suave del hueso -->
  <g opacity="0.18">
    <ellipse cx="66" cy="100" rx="38" ry="7" fill="#7A5C1E"/>
  </g>

  <!-- Shaft del hueso diagonal (cuerpo central) -->
  <!-- Contorno oscuro -->
  <rect x="42" y="48" width="44" height="22" rx="11" ry="11"
        transform="rotate(-40, 64, 59)"
        fill="#9A7030" stroke="#7A5018" stroke-width="1.5"/>
  <!-- Relleno con gradiente -->
  <rect x="42" y="48" width="44" height="22" rx="11" ry="11"
        transform="rotate(-40, 64, 59)"
        fill="url(#g_bone_shaft)"/>
  <!-- Brillo en el shaft -->
  <rect x="44" y="51" width="18" height="8" rx="4" ry="4"
        transform="rotate(-40, 64, 59)"
        fill="url(#g_bone_highlight)" opacity="0.6"/>

  <!-- Extremo superior-izquierdo: 2 bolitas -->
  <!-- Bola sup-izq A -->
  <circle cx="31" cy="30" r="14" fill="#9A7030" stroke="#7A5018" stroke-width="1.2"/>
  <circle cx="31" cy="30" r="14" fill="url(#g_bone_knob1)"/>
  <ellipse cx="27" cy="26" rx="5" ry="3.5" fill="#FFFFFF" opacity="0.4" transform="rotate(-20,27,26)"/>

  <!-- Bola sup-izq B -->
  <circle cx="44" cy="20" r="13" fill="#9A7030" stroke="#7A5018" stroke-width="1.2"/>
  <circle cx="44" cy="20" r="13" fill="url(#g_bone_knob2)"/>
  <ellipse cx="40" cy="16" rx="4.5" ry="3" fill="#FFFFFF" opacity="0.4" transform="rotate(-20,40,16)"/>

  <!-- Extremo inferior-derecho: 2 bolitas -->
  <!-- Bola inf-der A -->
  <circle cx="97" cy="98" r="14" fill="#9A7030" stroke="#7A5018" stroke-width="1.2"/>
  <circle cx="97" cy="98" r="14" fill="url(#g_bone_knob3)"/>
  <ellipse cx="93" cy="94" rx="5" ry="3.5" fill="#FFFFFF" opacity="0.4" transform="rotate(-20,93,94)"/>

  <!-- Bola inf-der B -->
  <circle cx="84" cy="108" r="13" fill="#9A7030" stroke="#7A5018" stroke-width="1.2"/>
  <circle cx="84" cy="108" r="13" fill="url(#g_bone_knob4)"/>
  <ellipse cx="80" cy="104" rx="4.5" ry="3" fill="#FFFFFF" opacity="0.4" transform="rotate(-20,80,104)"/>

  <!-- Tuetano en el centro del hueso (seccion transversal) -->
  <!-- Contorno tuetano -->
  <ellipse cx="64" cy="62" rx="8" ry="8"
           transform="rotate(-40, 64, 62)"
           fill="#9A7030" stroke="#7A4010" stroke-width="1"/>
  <!-- Tuetano con gradiente calido -->
  <ellipse cx="64" cy="62" rx="8" ry="8"
           transform="rotate(-40, 64, 62)"
           fill="url(#g_bone_marrow)"/>
  <!-- Brillo del tuetano -->
  <ellipse cx="61" cy="59" rx="3" ry="2"
           transform="rotate(-40, 61, 59)"
           fill="#FFFFFF" opacity="0.55"/>

  <!-- Detalle: anillo de tuetano secundario -->
  <ellipse cx="64" cy="62" rx="10.5" ry="10.5"
           transform="rotate(-40, 64, 62)"
           fill="none" stroke="#C8A050" stroke-width="1.2" stroke-dasharray="2,2" opacity="0.5"/>
</svg>