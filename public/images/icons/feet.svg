    <radialGradient id="g_feet_highlight" cx="38%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#FFDDE2" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFDDE2" stop-opacity="0"/>
