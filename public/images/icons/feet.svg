      <stop offset="100%" stop-color="#8C2B40"/>
    </radialGradient>
    <radialGradient id="g_feet_toe1" cx="45%" cy="35%" r="55%" fx="35%" fy="25%">
      <stop offset="0%" stop-color="#F7B8C0"/>
      <stop offset="50%" stop-color="#E8909A"/>
      <stop offset="100%" stop-color="#C96070"/>
    </radialGradient>
    <radialGradient id="g_feet_toe2" cx="45%" cy="35%" r="55%" fx="35%" fy="25%">
      <stop offset="0%" stop-color="#F7B8C0"/>
      <stop offset="50%" stop-color="#E8909A"/>
      <stop offset="100%" stop-color="#C96070"/>
    </radialGradient>
    <radialGradient id="g_feet_toe3" cx="45%" cy="35%" r="55%" fx="35%" fy="25%">
      <stop offset="0%" stop-color="#F7B8C0"/>
      <stop offset="50%" stop-color="#E8909A"/>
      <stop offset="100%" stop-color="#C96070"/>
    </radialGradient>
    <radialGradient id="g_feet_toe4" cx="45%" cy="35%" r="55%" fx="35%" fy="25%">
