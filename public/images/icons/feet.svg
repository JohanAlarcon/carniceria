  <!-- Toe 4 small pad -->
  <ellipse cx="82" cy="58" rx="5" ry="5.5" fill="url(#g_feet_pad_center)" stroke="#6A1E30" stroke-width="0.8"/>

  <!-- Palm highlight overlay -->
  <ellipse cx="56" cy="74" rx="16" ry="12" fill="url(#g_feet_highlight)"/>

  <!-- Subtle claw hints on toes -->
  <ellipse cx="36" cy="52" rx="3.5" ry="2.5" fill="#7A2438" opacity="0.6"/>
  <ellipse cx="51" cy="44" rx="3.5" ry="2.5" fill="#7A2438" opacity="0.6"/>
  <ellipse cx="67" cy="42" rx="3.5" ry="2.5" fill="#7A2438" opacity="0.6"/>
  <ellipse cx="82" cy="46" rx="3.5" ry="2.5" fill="#7A2438" opacity="0.6"/>
</svg>