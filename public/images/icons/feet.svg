    <radialGradient id="g_feet_pad_hl" cx="35%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#D9708A" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#D9708A" stop-opacity="0"/>
