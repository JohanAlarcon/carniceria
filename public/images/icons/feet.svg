  <!-- Palm / main pad -->
  <ellipse cx="64" cy="82" rx="28" ry="26" fill="url(#g_feet_palm)" stroke="#8C2B40" stroke-width="1.5"/>

  <!-- Central paw pad -->
  <ellipse cx="64" cy="84" rx="14" ry="11" fill="url(#g_feet_pad_center)" stroke="#6A1E30" stroke-width="1"/>
  <!-- Pad highlight -->
  <ellipse cx="60" cy="80" rx="6" ry="4" fill="url(#g_feet_pad_hl)"/>

  <!-- Toe 1 (left outer) -->
  <ellipse cx="36" cy="62" rx="10" ry="12" fill="url(#g_feet_toe1)" stroke="#8C2B40" stroke-width="1.2"/>
  <!-- Toe 1 small pad -->
  <ellipse cx="36" cy="64" rx="5" ry="5.5" fill="url(#g_feet_pad_center)" stroke="#6A1E30" stroke-width="0.8"/>

  <!-- Toe 2 -->
  <ellipse cx="51" cy="54" rx="10" ry="12" fill="url(#g_feet_toe2)" stroke="#8C2B40" stroke-width="1.2"/>
  <!-- Toe 2 small pad -->
  <ellipse cx="51" cy="56" rx="5" ry="5.5" fill="url(#g_feet_pad_center)" stroke="#6A1E30" stroke-width="0.8"/>

  <!-- Toe 3 -->
  <ellipse cx="67" cy="52" rx="10" ry="12" fill="url(#g_feet_toe3)" stroke="#8C2B40" stroke-width="1.2"/>
  <!-- Toe 3 small pad -->
  <ellipse cx="67" cy="54" rx="5" ry="5.5" fill="url(#g_feet_pad_center)" stroke="#6A1E30" stroke-width="0.8"/>

