<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="g_tripe_base" cx="50%" cy="45%" r="52%" fx="40%" fy="35%">
      <stop offset="0%" stop-color="#f0e6d3"/>
      <stop offset="40%" stop-color="#ece0cc"/>
      <stop offset="80%" stop-color="#d8c6a8"/>
      <stop offset="100%" stop-color="#c0ac88"/>
    </radialGradient>
    <radialGradient id="g_tripe_highlight" cx="38%" cy="30%" r="42%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g_tripe_shadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c9a96e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#6b5230" stop-opacity="0.42"/>
    </linearGradient>
    <radialGradient id="g_tripe_cell" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#e8dabf"/>
      <stop offset="100%" stop-color="#c9b48c"/>
    </radialGradient>
    <radialGradient id="g_tripe_vignette" cx="50%" cy="45%" r="56%">
      <stop offset="62%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#3a2c14" stop-opacity="0.30"/>
    </radialGradient>
    <linearGradient id="g_tripe_rim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ddccae"/>
      <stop offset="100%" stop-color="#a08858"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.0"/>
    </filter>
    <clipPath id="clip_tripe">
      <ellipse cx="64" cy="68" rx="50" ry="38"/>
    </clipPath>
  </defs>

  <!-- Main tripe body - folded/rolled piece -->
  <ellipse cx="64" cy="68" rx="50" ry="38" fill="url(#g_tripe_base)" stroke="#8a6030" stroke-width="1.2"/>

  <!-- Honeycomb texture layer - rows of hexagonal cells -->
  <!-- Row 1 -->
  <polygon points="36,48 40,45 44,48 44,54 40,57 36,54" fill="url(#g_tripe_cell)" stroke="#8a6030" stroke-width="0.8" opacity="0.85"/>
  <polygon points="44,48 48,45 52,48 52,54 48,57 44,54" fill="url(#g_tripe_cell)" stroke="#8a6030" stroke-width="0.8" opacity="0.85"/>
  <polygon points="52,48 56,45 60,48 60,54 56,57 52,54" fill="url(#g_tripe_cell)" stroke="#8a6030" stroke-width="0.8" opacity="0.85"/>
  <polygon points="60,48 64,45 68,48 68,54 64,57 60,54" fill="url(#g_tripe_cell)" stroke="#8a6030" stroke-width="0.8" opacity="0.85"/>
  <polygon points="68,48 72,45 76,48 76,54 72,57 68,54" fill="url(#g_tripe_cell)" stroke="#8a6030" stroke-width="0.8" opacity="0.85"/>
  <polygon points="76,48 80,45 84,48 84,54 80,57 76,54" fill="url(#g_tripe_cell)" stroke="#8a6030" stroke-width="0.8" opacity="0.85"/>

  <!-- Row 2 (offset) -->
  <polygon points="32,57 36,54 40,57 40,63 36,66 32,63" fill="url(#g_tripe_cell)" stroke="#8a6030" stroke-width="0.8" opacity="0.85"/>
  <polygon points="40,57 44,54 48,57 48,63 44,66 40,63" fill="url(#g_tripe_cell)" stroke="#8a6030" stroke-width="0.8" opacity="0.85"/>
  <polygon points="48,57 52,54 56,57 56,63 52,66 48,63" fill="url(#g_tripe_cell)" stroke="#8a6030" stroke-width="0.8" opacity="0.85"/>
  <polygon points="56,57 60,54 64,57 64,63 60,66 56,63" fill="url(#g_tripe_cell)" stroke="#8a6030" stroke-width="0.8" opacity="0.85"/>
  <polygon points="64,57 68,54 72,57 72,63 68,66 64,63" fill="url(#g_tripe_cell)" stroke="#8a6030" stroke-width="0.8" opacity="0.85"/>
  <polygon points="72,57 76,54 80,57 80,63 76,66 72,63" fill="url(#g_tripe_cell)" stroke="#8a6030" stroke-width="0.8" opacity="0.85"/>
  <polygon points="80,57 84,54 88,57 88,63 84,66 80,63" fill="url(#g_tripe_cell)" stroke="#8a6030" stroke-width="0.8" opacity="0.85"/>

  <!-- Row 3 -->
  <polygon points="36,66 40,63 44,66 44,72 40,75 36,72" fill="url(#g_tripe_cell)" stroke="#8a6030" stroke-width="0.8" opacity="0.85"/>
  <polygon points="44,66 48,63 52,66 52,72 48,75 44,72" fill="url(#g_tripe_cell)" stroke="#8a6030" stroke-width="0.8" opacity="0.85"/>
  <polygon points="52,66 56,63 60,66 60,72 56,75 52,72" fill="url(#g_tripe_cell)" stroke="#8a6030" stroke-width="0.8" opacity="0.85"/>
  <polygon points="60,66 64,63 68,66 68,72 64,75 60,72" fill="url(#g_tripe_cell)" stroke="#8a6030" stroke-width="0.8" opacity="0.85"/>
  <polygon points="68,66 72,63 76,66 76,72 72,75 68,72" fill="url(#g_tripe_cell)" stroke="#8a6030" stroke-width="0.8" opacity="0.85"/>
  <polygon points="76,66 80,63 84,66 84,72 80,75 76,72" fill="url(#g_tripe_cell)" stroke="#8a6030" stroke-width="0.8" opacity="0.85"/>

  <!-- Row 4 (offset, partial) -->
  <polygon points="40,75 44,72 48,75 48,81 44,84 40,81" fill="url(#g_tripe_cell)" stroke="#8a6030" stroke-width="0.8" opacity="0.85"/>
  <polygon points="48,75 52,72 56,75 56,81 52,84 48,81" fill="url(#g_tripe_cell)" stroke="#8a6030" stroke-width="0.8" opacity="0.85"/>
  <polygon points="56,75 60,72 64,75 64,81 60,84 56,81" fill="url(#g_tripe_cell)" stroke="#8a6030" stroke-width="0.8" opacity="0.85"/>
  <polygon points="64,75 68,72 72,75 72,81 68,84 64,81" fill="url(#g_tripe_cell)" stroke="#8a6030" stroke-width="0.8" opacity="0.85"/>
  <polygon points="72,75 76,72 80,75 80,81 76,84 72,81" fill="url(#g_tripe_cell)" stroke="#8a6030" stroke-width="0.8" opacity="0.85"/>

  <!-- Marmoleo suave: manchas de grasa calida desenfocadas, recortadas a la carne -->
  <g clip-path="url(#clip_tripe)" filter="url(#soft)" opacity="0.42">
    <path d="M 30 52 Q 44 47 56 53 Q 66 58 78 52 Q 72 57 62 57 Q 50 57 40 60 Q 33 60 30 52 Z" fill="#ece1cd"/>
    <path d="M 40 78 Q 54 74 66 79 Q 60 83 50 82 Q 42 81 40 78 Z" fill="#efe0d3"/>
    <ellipse cx="82" cy="70" rx="6" ry="3" transform="rotate(10 82 70)" fill="#efe0d3"/>
  </g>

  <!-- Overall shadow gradient overlay -->
  <ellipse cx="64" cy="68" rx="50" ry="38" fill="url(#g_tripe_shadow)" stroke="none"/>

  <!-- Vignette (volumen mate sin plastico) -->
  <ellipse cx="64" cy="68" rx="50" ry="38" fill="url(#g_tripe_vignette)" stroke="none"/>

  <!-- Sheen mate muy sutil -->
  <ellipse cx="64" cy="68" rx="50" ry="38" fill="url(#g_tripe_highlight)" stroke="none"/>

  <!-- Top folded rim of the tripe piece -->
  <path d="M24,55 Q35,38 55,34 Q75,30 90,40 Q100,47 95,58" fill="none" stroke="url(#g_tripe_rim)" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M24,55 Q35,38 55,34 Q75,30 90,40 Q100,47 95,58" fill="none" stroke="#ece0cc" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>

  <!-- Subtle inner fold line -->
  <path d="M30,62 Q50,50 70,52 Q85,54 92,64" fill="none" stroke="#9a7040" stroke-width="1" stroke-linecap="round" opacity="0.5"/>

  <!-- Contorno oscuro fino para definicion -->
  <ellipse cx="64" cy="68" rx="50" ry="38" fill="none" stroke="#6b4e2a" stroke-width="1.1" opacity="0.55"/>

  <!-- Bottom shadow under the piece -->
  <ellipse cx="64" cy="104" rx="42" ry="6" fill="#7a5c30" opacity="0.18"/>
</svg>
