<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="g_cheek_main" cx="42%" cy="38%" r="58%" fx="38%" fy="32%">
      <stop offset="0%" stop-color="#c15f50"/>
      <stop offset="35%" stop-color="#a23f34"/>
      <stop offset="70%" stop-color="#822a20"/>
      <stop offset="100%" stop-color="#5e1a13"/>
    </radialGradient>
    <radialGradient id="g_cheek_shine" cx="38%" cy="28%" r="42%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g_cheek_shadow" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#5e1a13" stop-opacity="0"/>
      <stop offset="100%" stop-color="#3d0504" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="g_cheek_vignette" cx="50%" cy="44%" r="58%">
      <stop offset="62%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#2c0a07" stop-opacity="0.3"/>
    </radialGradient>
    <radialGradient id="g_cheek_shadowfloor" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a0a" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#1a0a0a" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.1"/>
    </filter>
    <clipPath id="clip_cheek">
      <path d="M22,52 C18,38 24,22 38,16 C52,10 70,12 82,20 C96,28 108,40 108,58 C108,76 100,94 86,102 C72,110 52,112 38,104 C24,96 16,80 16,66 C16,62 18,56 22,52 Z"/>
    </clipPath>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="62" cy="114" rx="42" ry="6" fill="url(#g_cheek_shadowfloor)"/>

  <!-- Main meat chunk - rounded cheek shape -->
  <path d="M22,52 C18,38 24,22 38,16 C52,10 70,12 82,20 C96,28 108,40 108,58 C108,76 100,94 86,102 C72,110 52,112 38,104 C24,96 16,80 16,66 C16,62 18,56 22,52 Z" fill="url(#g_cheek_main)"/>

  <!-- Shadow overlay for depth -->
  <path d="M22,52 C18,38 24,22 38,16 C52,10 70,12 82,20 C96,28 108,40 108,58 C108,76 100,94 86,102 C72,110 52,112 38,104 C24,96 16,80 16,66 C16,62 18,56 22,52 Z" fill="url(#g_cheek_shadow)"/>

  <!-- Marmoleo natural: manchas suaves desenfocadas (grasa), recortadas a la carne -->
  <g clip-path="url(#clip_cheek)" filter="url(#soft)" opacity="0.5">
    <path d="M32,32 C42,29 50,36 60,33 C70,30 76,36 84,34 C78,39 70,37 60,39 C50,41 42,37 34,39 C31,37 31,34 32,32 Z" fill="#ece1cd"/>
    <path d="M26,56 C36,52 46,60 56,56 C66,52 76,58 88,55 C80,60 70,58 58,61 C46,64 36,61 28,60 C26,59 25,57 26,56 Z" fill="#efe0d3"/>
    <path d="M32,78 C42,74 54,81 66,77 C76,74 84,79 94,77 C86,82 76,80 66,82 C54,84 42,82 34,82 C32,81 31,79 32,78 Z" fill="#e3cdba"/>
    <ellipse cx="36" cy="42" rx="7" ry="3.4" transform="rotate(-20,36,42)" fill="#ece1cd"/>
    <ellipse cx="90" cy="65" rx="8" ry="3.8" transform="rotate(15,90,65)" fill="#e3cdba"/>
    <ellipse cx="55" cy="90" rx="8.5" ry="3.4" transform="rotate(-8,55,90)" fill="#efe0d3"/>
  </g>

  <!-- Vignette (volumen mate sin plastico) -->
  <path d="M22,52 C18,38 24,22 38,16 C52,10 70,12 82,20 C96,28 108,40 108,58 C108,76 100,94 86,102 C72,110 52,112 38,104 C24,96 16,80 16,66 C16,62 18,56 22,52 Z" fill="url(#g_cheek_vignette)"/>

  <!-- Sheen mate muy sutil -->
  <path d="M22,52 C18,38 24,22 38,16 C52,10 70,12 82,20 C96,28 108,40 108,58 C108,76 100,94 86,102 C72,110 52,112 38,104 C24,96 16,80 16,66 C16,62 18,56 22,52 Z" fill="url(#g_cheek_shine)"/>

  <!-- Contorno oscuro fino -->
  <path d="M22,52 C18,38 24,22 38,16 C52,10 70,12 82,20 C96,28 108,40 108,58 C108,76 100,94 86,102 C72,110 52,112 38,104 C24,96 16,80 16,66 C16,62 18,56 22,52 Z" fill="none" stroke="#3d0d09" stroke-width="1.4" opacity="0.55"/>
</svg>
