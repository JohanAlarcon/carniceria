<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="g_crab_body" cx="50%" cy="40%" r="55%" fx="40%" fy="30%">
      <stop offset="0%" stop-color="#d9825f"/>
      <stop offset="40%" stop-color="#bf5a3d"/>
      <stop offset="100%" stop-color="#883320"/>
    </radialGradient>
    <radialGradient id="g_crab_shell" cx="45%" cy="35%" r="60%" fx="35%" fy="25%">
      <stop offset="0%" stop-color="#d9825f"/>
      <stop offset="35%" stop-color="#c05a3c"/>
      <stop offset="100%" stop-color="#833020"/>
    </radialGradient>
    <linearGradient id="g_crab_claw_l" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d67c5a"/>
      <stop offset="50%" stop-color="#bb5236"/>
      <stop offset="100%" stop-color="#872f1e"/>
    </linearGradient>
    <linearGradient id="g_crab_claw_r" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d67c5a"/>
      <stop offset="50%" stop-color="#bb5236"/>
      <stop offset="100%" stop-color="#872f1e"/>
    </linearGradient>
    <linearGradient id="g_crab_leg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c66848"/>
      <stop offset="100%" stop-color="#8c3620"/>
    </linearGradient>
    <radialGradient id="g_crab_eye" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#222222"/>
      <stop offset="60%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="g_crab_eye_shine" cx="35%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g_crab_belly" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#e2926e"/>
      <stop offset="60%" stop-color="#c4694a"/>
      <stop offset="100%" stop-color="#9c4832"/>
    </radialGradient>
    <radialGradient id="g_crab_highlight" cx="38%" cy="30%" r="46%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#FFFFFF" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g_crab_vignette" cx="50%" cy="45%" r="58%">
      <stop offset="62%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#3a120b" stop-opacity="0.28"/>
    </radialGradient>
  </defs>

  <!-- Back legs left -->
  <g stroke="#7A1800" stroke-width="1.2" stroke-linecap="round">
    <line x1="38" y1="68" x2="18" y2="58" stroke="url(#g_crab_leg)" stroke-width="4"/>
    <line x1="18" y1="58" x2="12" y2="48" stroke="url(#g_crab_leg)" stroke-width="3"/>
    <line x1="36" y1="73" x2="15" y2="68" stroke="url(#g_crab_leg)" stroke-width="4"/>
    <line x1="15" y1="68" x2="10" y2="58" stroke="url(#g_crab_leg)" stroke-width="3"/>
    <line x1="37" y1="79" x2="16" y2="79" stroke="url(#g_crab_leg)" stroke-width="4"/>
    <line x1="16" y1="79" x2="11" y2="70" stroke="url(#g_crab_leg)" stroke-width="3"/>
  </g>

  <!-- Back legs right -->
  <g stroke="#7A1800" stroke-width="1.2" stroke-linecap="round">
    <line x1="90" y1="68" x2="110" y2="58" stroke="url(#g_crab_leg)" stroke-width="4"/>
    <line x1="110" y1="58" x2="116" y2="48" stroke="url(#g_crab_leg)" stroke-width="3"/>
    <line x1="92" y1="73" x2="113" y2="68" stroke="url(#g_crab_leg)" stroke-width="4"/>
    <line x1="113" y1="68" x2="118" y2="58" stroke="url(#g_crab_leg)" stroke-width="3"/>
    <line x1="91" y1="79" x2="112" y2="79" stroke="url(#g_crab_leg)" stroke-width="4"/>
    <line x1="112" y1="79" x2="117" y2="70" stroke="url(#g_crab_leg)" stroke-width="3"/>
  </g>

  <!-- Left claw arm -->
  <path d="M38,62 Q20,50 16,38" fill="none" stroke="url(#g_crab_claw_l)" stroke-width="7" stroke-linecap="round"/>
  <!-- Left claw upper -->
  <ellipse cx="13" cy="30" rx="10" ry="6" transform="rotate(-25,13,30)" fill="url(#g_crab_claw_l)" stroke="#7A1800" stroke-width="1"/>
  <!-- Left claw lower -->
  <ellipse cx="13" cy="38" rx="9" ry="5" transform="rotate(15,13,38)" fill="url(#g_crab_claw_l)" stroke="#7A1800" stroke-width="1"/>
  <!-- Left claw gap -->
  <path d="M7,33 Q13,36 19,33" fill="none" stroke="#7A1800" stroke-width="1.2"/>

  <!-- Right claw arm -->
  <path d="M90,62 Q108,50 112,38" fill="none" stroke="url(#g_crab_claw_r)" stroke-width="7" stroke-linecap="round"/>
  <!-- Right claw upper -->
  <ellipse cx="115" cy="30" rx="10" ry="6" transform="rotate(25,115,30)" fill="url(#g_crab_claw_r)" stroke="#7A1800" stroke-width="1"/>
  <!-- Right claw lower -->
  <ellipse cx="115" cy="38" rx="9" ry="5" transform="rotate(-15,115,38)" fill="url(#g_crab_claw_r)" stroke="#7A1800" stroke-width="1"/>
  <!-- Right claw gap -->
  <path d="M121,33 Q115,36 109,33" fill="none" stroke="#7A1800" stroke-width="1.2"/>

  <!-- Body / carapace -->
  <ellipse cx="64" cy="72" rx="34" ry="20" fill="url(#g_crab_belly)" stroke="#7A1800" stroke-width="1.2"/>

  <!-- Main shell -->
  <ellipse cx="64" cy="60" rx="36" ry="26" fill="url(#g_crab_shell)" stroke="#7A1800" stroke-width="1.5"/>

  <!-- Shell texture lines -->
  <path d="M40,52 Q64,46 88,52" fill="none" stroke="#a84a30" stroke-width="1" opacity="0.5"/>
  <path d="M36,60 Q64,54 92,60" fill="none" stroke="#a84a30" stroke-width="1" opacity="0.4"/>
  <path d="M38,68 Q64,62 90,68" fill="none" stroke="#a84a30" stroke-width="1" opacity="0.35"/>
  <!-- Vertical center line -->
  <path d="M64,34 Q64,60 64,84" fill="none" stroke="#9c4830" stroke-width="1" opacity="0.4"/>

  <!-- Shell vignette (volumen mate) -->
  <ellipse cx="64" cy="60" rx="36" ry="26" fill="url(#g_crab_vignette)"/>

  <!-- Shell sheen mate muy sutil -->
  <ellipse cx="56" cy="50" rx="18" ry="10" fill="url(#g_crab_highlight)" opacity="0.7"/>

  <!-- Eye stalks -->
  <rect x="53" y="35" width="4" height="10" rx="2" fill="#b0492c" stroke="#7A1800" stroke-width="0.8"/>
  <rect x="71" y="35" width="4" height="10" rx="2" fill="#b0492c" stroke="#7A1800" stroke-width="0.8"/>

  <!-- Eyes -->
  <circle cx="55" cy="33" r="6" fill="url(#g_crab_eye)" stroke="#330000" stroke-width="0.8"/>
  <circle cx="73" cy="33" r="6" fill="url(#g_crab_eye)" stroke="#330000" stroke-width="0.8"/>

  <!-- Eye shine -->
  <circle cx="52.5" cy="30.5" r="2.2" fill="url(#g_crab_eye_shine)"/>
  <circle cx="70.5" cy="30.5" r="2.2" fill="url(#g_crab_eye_shine)"/>

  <!-- Mouth / rostrum -->
  <path d="M58,42 Q64,46 70,42" fill="none" stroke="#8B1800" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Front small antennae -->
  <line x1="55" y1="28" x2="46" y2="20" stroke="#b0492c" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="73" y1="28" x2="82" y2="20" stroke="#b0492c" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="55" y1="28" x2="48" y2="17" stroke="#b0492c" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="73" y1="28" x2="80" y2="17" stroke="#b0492c" stroke-width="0.8" stroke-linecap="round"/>
</svg>
