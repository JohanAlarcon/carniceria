<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="g_chicken-breast_main" cx="45%" cy="38%" r="60%" fx="40%" fy="32%">
      <stop offset="0%" stop-color="#f0dcc8"/>
      <stop offset="38%" stop-color="#e6cbaf"/>
      <stop offset="72%" stop-color="#dcbc98"/>
      <stop offset="100%" stop-color="#c6a377"/>
    </radialGradient>
    <linearGradient id="g_chicken-breast_shadow" x1="30%" y1="20%" x2="75%" y2="90%">
      <stop offset="0%" stop-color="#b79a70" stop-opacity="0"/>
      <stop offset="70%" stop-color="#a5824f" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#8c6a3d" stop-opacity="0.42"/>
    </linearGradient>
    <linearGradient id="g_chicken-breast_fatridge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#efe0d3"/>
      <stop offset="100%" stop-color="#e3cdba"/>
    </linearGradient>
    <radialGradient id="g_chicken-breast_sheen" cx="40%" cy="26%" r="42%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g_chicken-breast_vignette" cx="50%" cy="45%" r="58%">
      <stop offset="62%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#4a3416" stop-opacity="0.28"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.0"/>
    </filter>
    <clipPath id="clip_chicken">
      <path d="M 32 67
               C 24 61, 17 50, 21 37
               C 25 24, 40 14, 57 13
               C 71 12, 84 18, 92 30
               C 99 41, 98 57, 93 68
               C 88 79, 79 89, 69 96
               C 61 102, 52 104, 44 101
               C 35 96, 30 85, 30 75
               Z"/>
    </clipPath>
  </defs>

  <!-- Drop shadow -->
  <ellipse cx="65" cy="112" rx="42" ry="7" fill="#8b5030" fill-opacity="0.18"/>

  <!-- Main breast body outline/base -->
  <path d="M 30 68
           C 22 62, 14 50, 18 36
           C 22 22, 38 12, 56 11
           C 70 10, 84 16, 92 28
           C 100 40, 100 56, 95 68
           C 90 80, 80 90, 70 97
           C 62 103, 52 106, 44 102
           C 34 97, 28 86, 28 76
           Z"
        fill="#a8875a" stroke="none"/>

  <!-- Main flesh fill -->
  <path d="M 32 67
           C 24 61, 17 50, 21 37
           C 25 24, 40 14, 57 13
           C 71 12, 84 18, 92 30
           C 99 41, 98 57, 93 68
           C 88 79, 79 89, 69 96
           C 61 102, 52 104, 44 101
           C 35 96, 30 85, 30 75
           Z"
        fill="url(#g_chicken-breast_main)"/>

  <!-- Shadow overlay -->
  <path d="M 32 67
           C 24 61, 17 50, 21 37
           C 25 24, 40 14, 57 13
           C 71 12, 84 18, 92 30
           C 99 41, 98 57, 93 68
           C 88 79, 79 89, 69 96
           C 61 102, 52 104, 44 101
           C 35 96, 30 85, 30 75
           Z"
        fill="url(#g_chicken-breast_shadow)"/>

  <!-- Marmoleo/grasa: manchas suaves desenfocadas, recortadas a la carne -->
  <g clip-path="url(#clip_chicken)" filter="url(#soft)" opacity="0.5">
    <path d="M 34 40 Q 44 35 52 41 Q 48 45 42 44 Q 36 43 34 40 Z" fill="#ece1cd"/>
    <path d="M 60 30 Q 72 27 80 33 Q 74 37 66 35 Q 60 34 60 30 Z" fill="#efe0d3"/>
    <path d="M 44 58 Q 55 54 64 59 Q 58 63 50 62 Q 44 61 44 58 Z" fill="#e3cdba"/>
    <path d="M 46 78 Q 57 74 66 79 Q 60 83 52 82 Q 46 81 46 78 Z" fill="#efe0d3"/>
    <ellipse cx="80" cy="60" rx="6" ry="3" transform="rotate(22 80 60)" fill="#ece1cd"/>
    <ellipse cx="34" cy="72" rx="5" ry="2.6" transform="rotate(-6 34 72)" fill="#e3cdba"/>
  </g>

  <!-- Fat ridge along one edge (cofia de grasa) -->
  <path d="M 60 13 C 72 12, 84 18, 92 30 C 97 38, 99 48, 97 59"
        fill="none" stroke="url(#g_chicken-breast_fatridge)" stroke-width="5" stroke-linecap="round" opacity="0.7"/>

  <!-- Subtle dark outline -->
  <path d="M 32 67
           C 24 61, 17 50, 21 37
           C 25 24, 40 14, 57 13
           C 71 12, 84 18, 92 30
           C 99 41, 98 57, 93 68
           C 88 79, 79 89, 69 96
           C 61 102, 52 104, 44 101
           C 35 96, 30 85, 30 75
           Z"
        fill="none" stroke="#7a4f22" stroke-width="1.4" stroke-opacity="0.55"/>

  <!-- Vignette (volumen mate sin plastico) -->
  <path d="M 32 67
           C 24 61, 17 50, 21 37
           C 25 24, 40 14, 57 13
           C 71 12, 84 18, 92 30
           C 99 41, 98 57, 93 68
           C 88 79, 79 89, 69 96
           C 61 102, 52 104, 44 101
           C 35 96, 30 85, 30 75
           Z"
        fill="url(#g_chicken-breast_vignette)"/>

  <!-- Sheen mate muy sutil -->
  <path d="M 32 67
           C 24 61, 17 50, 21 37
           C 25 24, 40 14, 57 13
           C 71 12, 84 18, 92 30
           C 99 41, 98 57, 93 68
           C 88 79, 79 89, 69 96
           C 61 102, 52 104, 44 101
           C 35 96, 30 85, 30 75
           Z"
        fill="url(#g_chicken-breast_sheen)"/>
</svg>
