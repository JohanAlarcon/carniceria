<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="g_chicken-breast_main" cx="45%" cy="38%" r="58%" fx="38%" fy="30%">
      <stop offset="0%" stop-color="#f5d6c0"/>
      <stop offset="30%" stop-color="#f0c4a8"/>
      <stop offset="65%" stop-color="#e8ad8e"/>
      <stop offset="100%" stop-color="#d4896a"/>
    </radialGradient>
    <radialGradient id="g_chicken-breast_highlight" cx="35%" cy="28%" r="35%">
      <stop offset="0%" stop-color="#fdeee4" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#fdeee4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g_chicken-breast_shadow" x1="30%" y1="20%" x2="75%" y2="90%">
      <stop offset="0%" stop-color="#c97a58" stop-opacity="0"/>
      <stop offset="70%" stop-color="#b5613d" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#9e4e2c" stop-opacity="0.65"/>
    </linearGradient>
    <radialGradient id="g_chicken-breast_tissue1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f8ddd0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#f8ddd0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g_chicken-breast_fat1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff8f2" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#fef0e3" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fde8d4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g_chicken-breast_edge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8855f"/>
      <stop offset="100%" stop-color="#a05535"/>
    </linearGradient>
    <radialGradient id="g_chicken-breast_gloss" cx="40%" cy="25%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Drop shadow -->
  <ellipse cx="65" cy="112" rx="42" ry="7" fill="#8b5030" fill-opacity="0.18"/>

  <!-- Main breast body outline/base -->
  <path d="M 30 68
           C 22 62, 14 50, 18 36
           C 22 22, 38 12, 56 11
           C 70 10, 84 16, 92 28
           C 100 40, 100 56, 95 68
           C 90 80, 80 90, 70 97
           C 62 103, 52 106, 44 102
           C 34 97, 28 86, 28 76
           Z"
        fill="#b86040" stroke="none"/>

  <!-- Main flesh fill -->
  <path d="M 32 67
           C 24 61, 17 50, 21 37
           C 25 24, 40 14, 57 13
           C 71 12, 84 18, 92 30
           C 99 41, 98 57, 93 68
           C 88 79, 79 89, 69 96
           C 61 102, 52 104, 44 101
           C 35 96, 30 85, 30 75
           Z"
        fill="url(#g_chicken-breast_main)"/>

  <!-- Shadow overlay -->
  <path d="M 32 67
           C 24 61, 17 50, 21 37
           C 25 24, 40 14, 57 13
           C 71 12, 84 18, 92 30
           C 99 41, 98 57, 93 68
           C 88 79, 79 89, 69 96
           C 61 102, 52 104, 44 101
           C 35 96, 30 85, 30 75
           Z"
        fill="url(#g_chicken-breast_shadow)"/>

  <!-- Connective tissue streaks (lighter pink) -->
  <path d="M 45 20 C 52 30, 55 45, 50 65 C 47 75, 44 85, 46 96"
        fill="none" stroke="url(#g_chicken-breast_tissue1)" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <path d="M 62 13 C 68 25, 72 42, 70 62 C 68 75, 65 88, 63 97"
        fill="none" stroke="url(#g_chicken-breast_tissue1)" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  <path d="M 78 22 C 82 36, 86 52, 84 68 C 82 78, 78 88, 71 96"
        fill="none" stroke="url(#g_chicken-breast_tissue1)" stroke-width="3.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Fat marbling blobs -->
  <ellipse cx="38" cy="42" rx="7" ry="4" transform="rotate(-20 38 42)" fill="url(#g_chicken-breast_fat1)" opacity="0.8"/>
  <ellipse cx="75" cy="35" rx="6" ry="3.5" transform="rotate(15 75 35)" fill="url(#g_chicken-breast_fat1)" opacity="0.75"/>
  <ellipse cx="55" cy="80" rx="8" ry="3" transform="rotate(-10 55 80)" fill="url(#g_chicken-breast_fat1)" opacity="0.7"/>
  <ellipse cx="82" cy="60" rx="5" ry="3" transform="rotate(25 82 60)" fill="url(#g_chicken-breast_fat1)" opacity="0.65"/>
  <ellipse cx="33" cy="73" rx="4" ry="2.5" transform="rotate(-5 33 73)" fill="url(#g_chicken-breast_fat1)" opacity="0.6"/>
  <ellipse cx="63" cy="55" rx="6" ry="2.5" transform="rotate(10 63 55)" fill="url(#g_chicken-breast_fat1)" opacity="0.55"/>

  <!-- Fat ridge along one edge (white fat strip) -->
  <path d="M 60 13 C 72 12, 84 18, 92 30 C 97 38, 99 48, 97 59"
        fill="none" stroke="#fef5ec" stroke-width="6" stroke-linecap="round" opacity="0.55"/>
  <path d="M 60 13 C 72 12, 84 18, 92 30 C 97 38, 99 48, 97 59"
        fill="none" stroke="#fff9f4" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

  <!-- Subtle dark outline -->
  <path d="M 32 67
           C 24 61, 17 50, 21 37
           C 25 24, 40 14, 57 13
           C 71 12, 84 18, 92 30
           C 99 41, 98 57, 93 68
           C 88 79, 79 89, 69 96
           C 61 102, 52 104, 44 101
           C 35 96, 30 85, 30 75
           Z"
        fill="none" stroke="#8a4020" stroke-width="1.8" stroke-opacity="0.5"/>

  <!-- Gloss / wet sheen -->
  <path d="M 32 67
           C 24 61, 17 50, 21 37
           C 25 24, 40 14, 57 13
           C 71 12, 84 18, 92 30
           C 99 41, 98 57, 93 68
           C 88 79, 79 89, 69 96
           C 61 102, 52 104, 44 101
           C 35 96, 30 85, 30 75
           Z"
        fill="url(#g_chicken-breast_gloss)"/>

  <!-- Highlight spot top-left -->
  <ellipse cx="44" cy="34" rx="16" ry="10" transform="rotate(-25 44 34)" fill="url(#g_chicken-breast_highlight)" opacity="0.9"/>
</svg>