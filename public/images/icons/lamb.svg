<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Body wool gradient -->
    <radialGradient id="g_lamb_body" cx="50%" cy="45%" r="52%" fx="40%" fy="35%">
      <stop offset="0%" stop-color="#F5F0E8"/>
      <stop offset="40%" stop-color="#EDE5D0"/>
      <stop offset="80%" stop-color="#D4C8A8"/>
      <stop offset="100%" stop-color="#B8AA85"/>
    </radialGradient>
    <!-- Wool puff highlight -->
    <radialGradient id="g_lamb_puff1" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FDFAF4"/>
      <stop offset="60%" stop-color="#EDE5D0"/>
      <stop offset="100%" stop-color="#C8BA95"/>
    </radialGradient>
    <radialGradient id="g_lamb_puff2" cx="45%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#FAF7EF"/>
      <stop offset="55%" stop-color="#E8DFC8"/>
      <stop offset="100%" stop-color="#C4B68E"/>
    </radialGradient>
    <radialGradient id="g_lamb_puff3" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FDFBF5"/>
      <stop offset="50%" stop-color="#EBE2CC"/>
      <stop offset="100%" stop-color="#C6B890"/>
    </radialGradient>
    <!-- Face gradient - dark brown -->
    <radialGradient id="g_lamb_face" cx="45%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#6B4A2A"/>
      <stop offset="50%" stop-color="#4E3218"/>
      <stop offset="100%" stop-color="#2E1C08"/>
    </radialGradient>
    <!-- Nose/muzzle -->
    <radialGradient id="g_lamb_muzzle" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#8C5C38"/>
      <stop offset="100%" stop-color="#5A3318"/>
    </radialGradient>
    <!-- Ear gradient -->
    <linearGradient id="g_lamb_ear_l" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5A3A1A"/>
      <stop offset="100%" stop-color="#3A2008"/>
    </linearGradient>
    <linearGradient id="g_lamb_ear_r" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5A3A1A"/>
      <stop offset="100%" stop-color="#3A2008"/>
    </linearGradient>
    <!-- Ear inner -->
    <linearGradient id="g_lamb_ear_inner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C47A5A"/>
      <stop offset="100%" stop-color="#A05030"/>
    </linearGradient>
    <!-- Leg gradient -->
    <linearGradient id="g_lamb_leg" x1="0%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" stop-color="#5A3A1A"/>
      <stop offset="100%" stop-color="#2E1C08"/>
    </linearGradient>
    <!-- Hoof -->
    <linearGradient id="g_lamb_hoof" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3A2A18"/>
      <stop offset="100%" stop-color="#1A1008"/>
    </linearGradient>
    <!-- Wool shadow overlay -->
    <radialGradient id="g_lamb_shadow" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#8A7A58" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8A7A58" stop-opacity="0"/>
    </radialGradient>
    <!-- Eye shine -->
    <radialGradient id="g_lamb_eyeshine" cx="35%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Legs back -->
  <rect x="42" y="89" width="9" height="20" rx="4" fill="url(#g_lamb_leg)" stroke="#1A0E04" stroke-width="0.8"/>
  <ellipse cx="46.5" cy="110" rx="5" ry="3" fill="url(#g_lamb_hoof)"/>
  <rect x="72" y="89" width="9" height="20" rx="4" fill="url(#g_lamb_leg)" stroke="#1A0E04" stroke-width="0.8"/>
  <ellipse cx="76.5" cy="110" rx="5" ry="3" fill="url(#g_lamb_hoof)"/>

  <!-- Main body - large wool mass -->
  <ellipse cx="64" cy="76" rx="38" ry="28" fill="url(#g_lamb_body)" stroke="#8A7A55" stroke-width="1"/>

  <!-- Wool texture puffs - layered circles for fluffy look -->
  <!-- Bottom row -->
  <circle cx="32" cy="84" r="10" fill="url(#g_lamb_puff1)" stroke="#A89870" stroke-width="0.6"/>
  <circle cx="46" cy="88" r="11" fill="url(#g_lamb_puff2)" stroke="#A89870" stroke-width="0.6"/>
  <circle cx="62" cy="90" r="11" fill="url(#g_lamb_puff1)" stroke="#A89870" stroke-width="0.6"/>
  <circle cx="78" cy="88" r="11" fill="url(#g_lamb_puff3)" stroke="#A89870" stroke-width="0.6"/>
  <circle cx="93" cy="84" r="10" fill="url(#g_lamb_puff2)" stroke="#A89870" stroke-width="0.6"/>

  <!-- Middle row -->
  <circle cx="26" cy="74" r="11" fill="url(#g_lamb_puff3)" stroke="#A89870" stroke-width="0.6"/>
  <circle cx="40" cy="72" r="12" fill="url(#g_lamb_puff1)" stroke="#A89870" stroke-width="0.6"/>
  <circle cx="56" cy="70" r="13" fill="url(#g_lamb_puff2)" stroke="#A89870" stroke-width="0.6"/>
  <circle cx="72" cy="70" r="13" fill="url(#g_lamb_puff1)" stroke="#A89870" stroke-width="0.6"/>
  <circle cx="88" cy="72" r="12" fill="url(#g_lamb_puff3)" stroke="#A89870" stroke-width="0.6"/>
  <circle cx="100" cy="74" r="11" fill="url(#g_lamb_puff2)" stroke="#A89870" stroke-width="0.6"/>

  <!-- Top row -->
  <circle cx="36" cy="62" r="11" fill="url(#g_lamb_puff1)" stroke="#A89870" stroke-width="0.6"/>
  <circle cx="52" cy="58" r="12" fill="url(#g_lamb_puff3)" stroke="#A89870" stroke-width="0.6"/>
  <circle cx="68" cy="56" r="12" fill="url(#g_lamb_puff2)" stroke="#A89870" stroke-width="0.6"/>
  <circle cx="84" cy="60" r="11" fill="url(#g_lamb_puff1)" stroke="#A89870" stroke-width="0.6"/>

  <!-- Shadow overlay on body -->
  <ellipse cx="64" cy="82" rx="37" ry="22" fill="url(#g_lamb_shadow)"/>

  <!-- Ears -->
  <!-- Left ear -->
  <ellipse cx="28" cy="60" rx="7" ry="11" fill="url(#g_lamb_ear_l)" stroke="#1A0E04" stroke-width="0.8" transform="rotate(-20 28 60)"/>
  <ellipse cx="28" cy="60" rx="4" ry="7" fill="url(#g_lamb_ear_inner)" transform="rotate(-20 28 60)"/>
  <!-- Right ear -->
  <ellipse cx="100" cy="60" rx="7" ry="11" fill="url(#g_lamb_ear_r)" stroke="#1A0E04" stroke-width="0.8" transform="rotate(20 100 60)"/>
  <ellipse cx="100" cy="60" rx="4" ry="7" fill="url(#g_lamb_ear_inner)" transform="rotate(20 100 60)"/>

  <!-- Head - dark face -->
  <ellipse cx="64" cy="52" rx="18" ry="20" fill="url(#g_lamb_face)" stroke="#1A0E04" stroke-width="1"/>

  <!-- Wool on top of head -->
  <circle cx="52" cy="38" r="10" fill="url(#g_lamb_puff1)" stroke="#A89870" stroke-width="0.6"/>
  <circle cx="64" cy="34" r="11" fill="url(#g_lamb_puff2)" stroke="#A89870" stroke-width="0.6"/>
  <circle cx="76" cy="38" r="10" fill="url(#g_lamb_puff3)" stroke="#A89870" stroke-width="0.6"/>
  <circle cx="60" cy="30" r="8" fill="url(#g_lamb_puff1)" stroke="#A89870" stroke-width="0.6"/>
  <circle cx="72" cy="30" r="8" fill="url(#g_lamb_puff2)" stroke="#A89870" stroke-width="0.6"/>

  <!-- Muzzle -->
  <ellipse cx="64" cy="60" rx="10" ry="8" fill="url(#g_lamb_muzzle)" stroke="#2E1C08" stroke-width="0.8"/>

  <!-- Nostrils -->
  <ellipse cx="60" cy="60" rx="2" ry="1.5" fill="#2E1008"/>
  <ellipse cx="68" cy="60" rx="2" ry="1.5" fill="#2E1008"/>

  <!-- Mouth -->
  <path d="M60 63 Q64 66 68 63" fill="none" stroke="#2E1008" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Eyes -->
  <!-- Left eye -->
  <ellipse cx="55" cy="50" rx="4.5" ry="4" fill="#1A1008"/>
  <ellipse cx="55" cy="50" rx="3.5" ry="3" fill="#2C1C0C"/>
  <ellipse cx="55" cy="50" rx="2" ry="1.8" fill="#0A0604"/>
  <circle cx="53.5" cy="48.5" r="1.2" fill="url(#g_lamb_eyeshine)"/>
  <!-- Right eye -->
  <ellipse cx="73" cy="50" rx="4.5" ry="4" fill="#1A1008"/>
  <ellipse cx="73" cy="50" rx="3.5" ry="3" fill="#2C1C0C"/>
  <ellipse cx="73" cy="50" rx="2" ry="1.8" fill="#0A0604"/>
  <circle cx="71.5" cy="48.5" r="1.2" fill="url(#g_lamb_eyeshine)"/>

  <!-- Front legs -->
  <rect x="50" y="92" width="9" height="18" rx="4" fill="url(#g_lamb_leg)" stroke="#1A0E04" stroke-width="0.8"/>
  <ellipse cx="54.5" cy="111" rx="5" ry="3" fill="url(#g_lamb_hoof)"/>
  <rect x="69" y="92" width="9" height="18" rx="4" fill="url(#g_lamb_leg)" stroke="#1A0E04" stroke-width="0.8"/>
  <ellipse cx="73.5" cy="111" rx="5" ry="3" fill="url(#g_lamb_hoof)"/>

  <!-- Tail -->
  <ellipse cx="101" cy="78" rx="6" ry="7" fill="url(#g_lamb_puff1)" stroke="#A89870" stroke-width="0.7"/>
</svg>