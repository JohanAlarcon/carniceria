<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="g_meat_main" cx="45%" cy="40%" r="58%" fx="35%" fy="30%">
      <stop offset="0%" stop-color="#e8453c"/>
      <stop offset="35%" stop-color="#c0392b"/>
      <stop offset="70%" stop-color="#962d22"/>
      <stop offset="100%" stop-color="#6e1f18"/>
    </radialGradient>
    <radialGradient id="g_meat_highlight" cx="35%" cy="28%" r="40%">
      <stop offset="0%" stop-color="#f06060" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c0392b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g_meat_fat1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5ece0"/>
      <stop offset="50%" stop-color="#eeddd0"/>
      <stop offset="100%" stop-color="#dcc9b8"/>
    </linearGradient>
    <linearGradient id="g_meat_fat2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0e6d8"/>
      <stop offset="100%" stop-color="#d9c4b0"/>
    </linearGradient>
    <radialGradient id="g_meat_bone" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#f2f0eb"/>
      <stop offset="80%" stop-color="#ddd9d0"/>
      <stop offset="100%" stop-color="#c8c4ba"/>
    </radialGradient>
    <radialGradient id="g_meat_bone_end" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#edeae3"/>
      <stop offset="100%" stop-color="#c5c2b8"/>
    </radialGradient>
    <linearGradient id="g_meat_marbling1" x1="0%" y1="0%" x2="100%" y2="60%">
      <stop offset="0%" stop-color="#f0ddd4" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#e8cec3" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="g_meat_marbling2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#efd8cc" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#e0c8bc" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="g_meat_shadow" cx="50%" cy="90%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Drop shadow -->
  <ellipse cx="64" cy="112" rx="44" ry="7" fill="url(#g_meat_shadow)"/>

  <!-- Bone shaft (T-bone vertical bar) -->
  <rect x="58" y="14" width="13" height="62" rx="5" ry="5" fill="url(#g_meat_bone)" stroke="#b0aca0" stroke-width="1"/>

  <!-- Bone top cap (round end) -->
  <ellipse cx="64.5" cy="17" rx="9" ry="9" fill="url(#g_meat_bone_end)" stroke="#b0aca0" stroke-width="1"/>

  <!-- Bone highlight top cap -->
  <ellipse cx="62" cy="14" rx="4" ry="3" fill="#ffffff" fill-opacity="0.55"/>

  <!-- Bone horizontal bar (T crossbar) -->
  <rect x="30" y="56" width="68" height="12" rx="5" ry="5" fill="url(#g_meat_bone)" stroke="#b0aca0" stroke-width="1"/>

  <!-- Bone crossbar highlight -->
  <rect x="33" y="57.5" width="62" height="4" rx="2" fill="#ffffff" fill-opacity="0.45"/>

  <!-- Main meat body - large loin section (right of bone) -->
  <path d="M68 22 C80 18, 102 22, 112 32 C120 40, 118 58, 115 68 C112 78, 106 88, 98 95 C90 102, 78 106, 68 104 C62 103, 60 98, 60 92 L60 65 C60 62, 62 60, 65 60 L65 27 C65 24, 66 22, 68 22 Z" fill="url(#g_meat_main)" stroke="#7a1f16" stroke-width="1.2"/>

  <!-- Main meat body - smaller tenderloin section (left of bone) -->
  <path d="M60 65 C60 62, 58 60, 55 60 L55 72 C44 72, 32 76, 24 84 C18 90, 16 100, 20 106 C26 112, 42 112, 56 108 C62 106, 64 103, 64 98 L64 65 Z" fill="url(#g_meat_main)" stroke="#7a1f16" stroke-width="1.2"/>

  <!-- Fat cap on loin - outer edge top -->
  <path d="M68 22 C78 17, 100 20, 112 32 C116 36, 116 34, 113 30 C103 18, 82 14, 68 18 Z" fill="url(#g_meat_fat1)" stroke="#c8b09a" stroke-width="0.8"/>

  <!-- Fat cap on loin - right side -->
  <path d="M112 32 C120 40, 120 60, 116 70 C118 58, 118 40, 113 32 Z" fill="url(#g_meat_fat2)" stroke="#c8b09a" stroke-width="0.7"/>

  <!-- Fat cap tenderloin bottom -->
  <path d="M24 84 C18 90, 15 100, 20 107 C16 100, 18 90, 24 84 Z" fill="url(#g_meat_fat1)" stroke="#c8b09a" stroke-width="0.7"/>

  <!-- Marbling veins loin section -->
  <path d="M72 30 C80 34, 88 30, 95 36 C88 32, 80 36, 72 30 Z" fill="url(#g_meat_marbling1)" stroke="none"/>
  <path d="M75 44 C84 46, 96 42, 104 50 C96 44, 84 48, 75 44 Z" fill="url(#g_meat_marbling1)" stroke="none"/>
  <path d="M70 58 C80 56, 92 60, 100 68 C90 62, 79 58, 70 58 Z" fill="url(#g_meat_marbling2)" stroke="none"/>
  <path d="M80 75 C90 72, 102 76, 108 84 C98 78, 88 74, 80 75 Z" fill="url(#g_meat_marbling1)" stroke="none"/>
  <path d="M68 88 C76 84, 88 88, 96 96 C86 90, 75 86, 68 88 Z" fill="url(#g_meat_marbling2)" stroke="none"/>

  <!-- Marbling veins tenderloin section -->
  <path d="M40 80 C46 76, 54 80, 56 88 C53 82, 46 78, 40 80 Z" fill="url(#g_meat_marbling1)" stroke="none"/>
  <path d="M32 90 C38 86, 48 90, 52 98 C46 92, 37 88, 32 90 Z" fill="url(#g_meat_marbling2)" stroke="none"/>

  <!-- Surface highlight on loin -->
  <path d="M72 24 C84 20, 104 26, 112 38 C102 26, 82 20, 72 24 Z" fill="url(#g_meat_highlight)" stroke="none"/>
  <ellipse cx="90" cy="45" rx="16" ry="10" fill="#f06060" fill-opacity="0.18" transform="rotate(-20 90 45)"/>

  <!-- Surface highlight on tenderloin -->
  <ellipse cx="40" cy="88" rx="10" ry="7" fill="#f06060" fill-opacity="0.15" transform="rotate(-30 40 88)"/>

  <!-- Bone shaft highlight -->
  <rect x="60" y="22" width="4" height="52" rx="2" fill="#ffffff" fill-opacity="0.5"/>
</svg>