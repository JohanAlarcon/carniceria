<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g_chicken-leg_skin1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="40%" stop-color="#D4831A"/>
      <stop offset="100%" stop-color="#A05A10"/>
    </linearGradient>
    <linearGradient id="g_chicken-leg_skin2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFCE6A"/>
      <stop offset="50%" stop-color="#E8940E"/>
      <stop offset="100%" stop-color="#B86A0A"/>
    </linearGradient>
    <radialGradient id="g_chicken-leg_highlight" cx="35%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#FFE49A" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#F5A623" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#A05A10" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g_chicken-leg_bone" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D8C9A8"/>
      <stop offset="40%" stop-color="#F5EDDC"/>
      <stop offset="100%" stop-color="#BFB090"/>
    </linearGradient>
    <radialGradient id="g_chicken-leg_boneknob" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#F7F0E0"/>
      <stop offset="70%" stop-color="#D8C9A8"/>
      <stop offset="100%" stop-color="#A89870"/>
    </radialGradient>
    <linearGradient id="g_chicken-leg_shadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7A3D08" stop-opacity="0"/>
      <stop offset="100%" stop-color="#5A2A04" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="g_chicken-leg_crisp1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8701A"/>
      <stop offset="100%" stop-color="#8B4200"/>
    </linearGradient>
  </defs>

  <!-- Bone shaft -->
  <rect x="74" y="88" width="10" height="30" rx="5" ry="5" fill="url(#g_chicken-leg_bone)" stroke="#B0A080" stroke-width="0.8"/>

  <!-- Bone knob bottom -->
  <ellipse cx="79" cy="118" rx="10" ry="7" fill="url(#g_chicken-leg_boneknob)" stroke="#A89060" stroke-width="0.8"/>

  <!-- Main drumstick body -->
  <path d="M 30 38 Q 18 60 22 82 Q 26 102 50 108 Q 74 114 86 96 Q 98 78 88 58 Q 80 40 60 32 Q 44 26 30 38 Z"
        fill="url(#g_chicken-leg_skin1)" stroke="#7A3D08" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Crispy surface texture layer 1 -->
  <path d="M 35 44 Q 24 64 28 84 Q 32 100 54 106 Q 72 110 82 94 Q 92 78 84 60 Q 76 44 58 36 Q 44 30 35 44 Z"
        fill="url(#g_chicken-leg_skin2)" stroke="none" opacity="0.7"/>

  <!-- Crispy bumps / texture details -->
  <ellipse cx="46" cy="52" rx="9" ry="7" fill="url(#g_chicken-leg_crisp1)" opacity="0.6" transform="rotate(-20 46 52)"/>
  <ellipse cx="68" cy="48" rx="7" ry="5" fill="url(#g_chicken-leg_crisp1)" opacity="0.5" transform="rotate(10 68 48)"/>
  <ellipse cx="78" cy="70" rx="8" ry="6" fill="url(#g_chicken-leg_crisp1)" opacity="0.5" transform="rotate(15 78 70)"/>
  <ellipse cx="55" cy="90" rx="9" ry="6" fill="url(#g_chicken-leg_crisp1)" opacity="0.45" transform="rotate(-10 55 90)"/>
  <ellipse cx="38" cy="74" rx="7" ry="5" fill="url(#g_chicken-leg_crisp1)" opacity="0.4" transform="rotate(-25 38 74)"/>
  <ellipse cx="62" cy="72" rx="6" ry="4" fill="#C86010" opacity="0.35" transform="rotate(5 62 72)"/>

  <!-- Highlight gloss -->
  <path d="M 36 42 Q 28 58 32 76 Q 36 90 52 98 Q 64 104 74 96 Q 82 88 80 72 Q 76 56 64 44 Q 52 34 36 42 Z"
        fill="url(#g_chicken-leg_highlight)" stroke="none"/>

  <!-- Shadow underlay -->
  <path d="M 30 38 Q 18 60 22 82 Q 26 102 50 108 Q 74 114 86 96 Q 98 78 88 58 Q 80 40 60 32 Q 44 26 30 38 Z"
        fill="url(#g_chicken-leg_shadow)" stroke="none"/>

  <!-- Bone top connector -->
  <ellipse cx="79" cy="92" rx="7" ry="5" fill="url(#g_chicken-leg_boneknob)" stroke="#B0A080" stroke-width="0.8"/>

  <!-- Dark outline rim for definition -->
  <path d="M 30 38 Q 18 60 22 82 Q 26 102 50 108 Q 74 114 86 96 Q 98 78 88 58 Q 80 40 60 32 Q 44 26 30 38 Z"
        fill="none" stroke="#5A2A04" stroke-width="2" stroke-linejoin="round" opacity="0.6"/>
</svg>