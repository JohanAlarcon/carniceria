<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g_chicken-leg_skin1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3d5af"/>
      <stop offset="40%" stop-color="#e7c292"/>
      <stop offset="100%" stop-color="#d1a975"/>
    </linearGradient>
    <linearGradient id="g_chicken-leg_skin2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6dcb6"/>
      <stop offset="50%" stop-color="#eac796"/>
      <stop offset="100%" stop-color="#d3ab76"/>
    </linearGradient>
    <radialGradient id="g_chicken-leg_sheen" cx="35%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g_chicken-leg_bone" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e0c392"/>
      <stop offset="40%" stop-color="#f3dfb8"/>
      <stop offset="100%" stop-color="#caa671"/>
    </linearGradient>
    <radialGradient id="g_chicken-leg_boneknob" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#f3dfb8"/>
      <stop offset="70%" stop-color="#e0c392"/>
      <stop offset="100%" stop-color="#b6945f"/>
    </radialGradient>
    <linearGradient id="g_chicken-leg_shadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6f481a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#4e2f0e" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="g_chicken-leg_vignette" cx="48%" cy="45%" r="58%">
      <stop offset="62%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#311b09" stop-opacity="0.3"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.0"/>
    </filter>
    <clipPath id="clip_chicken">
      <path d="M 30 38 Q 18 60 22 82 Q 26 102 50 108 Q 74 114 86 96 Q 98 78 88 58 Q 80 40 60 32 Q 44 26 30 38 Z"/>
    </clipPath>
  </defs>

  <!-- Bone shaft -->
  <rect x="74" y="88" width="10" height="30" rx="5" ry="5" fill="url(#g_chicken-leg_bone)" stroke="#b39b70" stroke-width="0.8"/>

  <!-- Bone knob bottom -->
  <ellipse cx="79" cy="118" rx="10" ry="7" fill="url(#g_chicken-leg_boneknob)" stroke="#ac8c53" stroke-width="0.8"/>

  <!-- Main drumstick body -->
  <path d="M 30 38 Q 18 60 22 82 Q 26 102 50 108 Q 74 114 86 96 Q 98 78 88 58 Q 80 40 60 32 Q 44 26 30 38 Z"
        fill="url(#g_chicken-leg_skin1)" stroke="#7e5323" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Skin tone variation layer -->
  <path d="M 35 44 Q 24 64 28 84 Q 32 100 54 106 Q 72 110 82 94 Q 92 78 84 60 Q 76 44 58 36 Q 44 30 35 44 Z"
        fill="url(#g_chicken-leg_skin2)" stroke="none" opacity="0.5"/>

  <!-- Marmoleo / mottling suave desenfocado, recortado a la carne -->
  <g clip-path="url(#clip_chicken)" filter="url(#soft)" opacity="0.5">
    <ellipse cx="46" cy="52" rx="9" ry="7" fill="#dbb782" transform="rotate(-20 46 52)"/>
    <ellipse cx="68" cy="48" rx="7" ry="5" fill="#f0dab3" transform="rotate(10 68 48)"/>
    <ellipse cx="78" cy="70" rx="8" ry="6" fill="#d6af75" transform="rotate(15 78 70)"/>
    <ellipse cx="55" cy="90" rx="9" ry="6" fill="#e0be8c" transform="rotate(-10 55 90)"/>
    <ellipse cx="38" cy="74" rx="7" ry="5" fill="#dbb782" transform="rotate(-25 38 74)"/>
    <ellipse cx="62" cy="72" rx="6" ry="4" fill="#f0dab3" transform="rotate(5 62 72)"/>
  </g>

  <!-- Shadow underlay (volumen) -->
  <path d="M 30 38 Q 18 60 22 82 Q 26 102 50 108 Q 74 114 86 96 Q 98 78 88 58 Q 80 40 60 32 Q 44 26 30 38 Z"
        fill="url(#g_chicken-leg_shadow)" stroke="none"/>

  <!-- Vignette interno mate -->
  <path d="M 30 38 Q 18 60 22 82 Q 26 102 50 108 Q 74 114 86 96 Q 98 78 88 58 Q 80 40 60 32 Q 44 26 30 38 Z"
        fill="url(#g_chicken-leg_vignette)" stroke="none"/>

  <!-- Sheen mate muy sutil -->
  <path d="M 36 42 Q 28 58 32 76 Q 36 90 52 98 Q 64 104 74 96 Q 82 88 80 72 Q 76 56 64 44 Q 52 34 36 42 Z"
        fill="url(#g_chicken-leg_sheen)" stroke="none"/>

  <!-- Bone top connector -->
  <ellipse cx="79" cy="92" rx="7" ry="5" fill="url(#g_chicken-leg_boneknob)" stroke="#b39b70" stroke-width="0.8"/>

  <!-- Dark outline rim for definition -->
  <path d="M 30 38 Q 18 60 22 82 Q 26 102 50 108 Q 74 114 86 96 Q 98 78 88 58 Q 80 40 60 32 Q 44 26 30 38 Z"
        fill="none" stroke="#4e2f0e" stroke-width="2" stroke-linejoin="round" opacity="0.55"/>
</svg>
