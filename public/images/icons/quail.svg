<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Body base gradient - warm brown (desaturated ~12%) -->
    <radialGradient id="g_quail_body" cx="48%" cy="45%" r="52%" fx="40%" fy="35%">
      <stop offset="0%" stop-color="#be8660"/>
      <stop offset="35%" stop-color="#996335"/>
      <stop offset="70%" stop-color="#754525"/>
      <stop offset="100%" stop-color="#572f13"/>
    </radialGradient>
    <!-- Belly gradient - lighter cream/buff (desaturated) -->
    <radialGradient id="g_quail_belly" cx="50%" cy="40%" r="55%" fx="50%" fy="30%">
      <stop offset="0%" stop-color="#e4cfa4"/>
      <stop offset="40%" stop-color="#ceae76"/>
      <stop offset="80%" stop-color="#b18e51"/>
      <stop offset="100%" stop-color="#946f36"/>
    </radialGradient>
    <!-- Head gradient -->
    <radialGradient id="g_quail_head" cx="45%" cy="38%" r="50%" fx="38%" fy="30%">
      <stop offset="0%" stop-color="#b17847"/>
      <stop offset="45%" stop-color="#855526"/>
      <stop offset="100%" stop-color="#573115"/>
    </radialGradient>
    <!-- Wing gradient -->
    <radialGradient id="g_quail_wing" cx="40%" cy="35%" r="60%" fx="30%" fy="25%">
      <stop offset="0%" stop-color="#be9060"/>
      <stop offset="40%" stop-color="#946836"/>
      <stop offset="80%" stop-color="#744e20"/>
      <stop offset="100%" stop-color="#593515"/>
    </radialGradient>
    <!-- Tail gradient -->
    <linearGradient id="g_quail_tail" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#855a2e"/>
      <stop offset="100%" stop-color="#462a0e"/>
    </linearGradient>
    <!-- Beak gradient -->
    <linearGradient id="g_quail_beak" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#877054"/>
      <stop offset="100%" stop-color="#574023"/>
    </linearGradient>
    <!-- Eye highlight -->
    <radialGradient id="g_quail_eye" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#555555"/>
      <stop offset="60%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <!-- Leg gradient -->
    <linearGradient id="g_quail_leg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ab8f65"/>
      <stop offset="100%" stop-color="#765f34"/>
    </linearGradient>
    <!-- Plume feather gradient -->
    <linearGradient id="g_quail_plume" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#663b1d"/>
      <stop offset="50%" stop-color="#371e0b"/>
      <stop offset="100%" stop-color="#1A0A00"/>
    </linearGradient>
    <!-- Highlight sheen on body (matte, very subtle) -->
    <radialGradient id="g_quail_sheen" cx="38%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.14"/>
      <stop offset="70%" stop-color="#FFFFFF" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Face mask dark area -->
    <radialGradient id="g_quail_mask" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2A1508"/>
      <stop offset="100%" stop-color="#1A0A04"/>
    </radialGradient>
  </defs>

  <!-- Shadow under bird -->
  <ellipse cx="64" cy="108" rx="30" ry="6" fill="#000000" fill-opacity="0.18"/>

  <!-- TAIL feathers -->
  <path d="M88 76 Q98 68 104 58 Q106 54 102 55 Q96 62 90 68 Z" fill="url(#g_quail_tail)" stroke="#3A1A05" stroke-width="0.5"/>
  <path d="M87 78 Q99 74 108 66 Q110 62 106 64 Q99 70 90 72 Z" fill="url(#g_quail_tail)" stroke="#3A1A05" stroke-width="0.5"/>
  <path d="M86 80 Q98 80 106 74 Q108 71 104 72 Q97 76 88 76 Z" fill="url(#g_quail_tail)" stroke="#3A1A05" stroke-width="0.5"/>

  <!-- MAIN BODY - plump rounded shape -->
  <ellipse cx="60" cy="78" rx="30" ry="26" fill="url(#g_quail_body)" stroke="#4A2205" stroke-width="1.2"/>

  <!-- WING overlay with markings -->
  <path d="M42 68 Q55 58 80 62 Q88 66 86 78 Q80 88 60 90 Q45 88 38 80 Q35 74 42 68 Z" fill="url(#g_quail_wing)" stroke="#4A2205" stroke-width="0.8"/>

  <!-- Wing feather line details -->
  <path d="M50 68 Q62 63 76 66" fill="none" stroke="#3A1808" stroke-width="0.8" stroke-dasharray="2,1.5"/>
  <path d="M48 73 Q62 68 78 70" fill="none" stroke="#3A1808" stroke-width="0.8" stroke-dasharray="2,1.5"/>
  <path d="M46 78 Q61 74 78 75" fill="none" stroke="#3A1808" stroke-width="0.8" stroke-dasharray="2,1.5"/>
  <path d="M47 83 Q61 80 76 80" fill="none" stroke="#3A1808" stroke-width="0.8" stroke-dasharray="2,1.5"/>

  <!-- BELLY - lighter area -->
  <ellipse cx="56" cy="83" rx="17" ry="14" fill="url(#g_quail_belly)" stroke="#8A6030" stroke-width="0.6"/>

  <!-- Belly streaks/spots (mottled pattern) -->
  <path d="M52 76 Q54 74 56 76 Q54 78 52 76 Z" fill="#6A4820" fill-opacity="0.7"/>
  <path d="M58 74 Q60 72 62 74 Q60 76 58 74 Z" fill="#6A4820" fill-opacity="0.7"/>
  <path d="M49 81 Q51 79 53 81 Q51 83 49 81 Z" fill="#7A5428" fill-opacity="0.6"/>
  <path d="M56 80 Q58 78 60 80 Q58 82 56 80 Z" fill="#7A5428" fill-opacity="0.6"/>
  <path d="M63 78 Q65 76 67 78 Q65 80 63 78 Z" fill="#7A5428" fill-opacity="0.6"/>
  <path d="M51 87 Q53 85 55 87 Q53 89 51 87 Z" fill="#6A4820" fill-opacity="0.6"/>
  <path d="M59 86 Q61 84 63 86 Q61 88 59 86 Z" fill="#6A4820" fill-opacity="0.6"/>

  <!-- Body mottled spots on back/wing (desaturated) -->
  <circle cx="72" cy="66" r="2.5" fill="#c29f66" fill-opacity="0.5"/>
  <circle cx="68" cy="62" r="2" fill="#c29f66" fill-opacity="0.4"/>
  <circle cx="78" cy="70" r="2" fill="#c6a86e" fill-opacity="0.45"/>
  <circle cx="74" cy="75" r="2.5" fill="#be9e5e" fill-opacity="0.4"/>
  <circle cx="82" cy="72" r="1.8" fill="#c6a86e" fill-opacity="0.4"/>
  <!-- Darker spots -->
  <circle cx="66" cy="70" r="1.8" fill="#4A2808" fill-opacity="0.5"/>
  <circle cx="73" cy="80" r="2" fill="#4A2808" fill-opacity="0.45"/>
  <circle cx="82" cy="66" r="1.5" fill="#3A1A08" fill-opacity="0.4"/>

  <!-- Body sheen highlight (matte) -->
  <ellipse cx="52" cy="66" rx="14" ry="9" fill="url(#g_quail_sheen)"/>

  <!-- NECK -->
  <path d="M45 62 Q48 50 52 46 Q56 44 58 46 Q56 52 52 60 Q50 63 45 62 Z" fill="url(#g_quail_head)" stroke="#3A1A05" stroke-width="0.8"/>

  <!-- HEAD - round and plump -->
  <circle cx="52" cy="44" r="18" fill="url(#g_quail_head)" stroke="#3A1A05" stroke-width="1.2"/>

  <!-- HEAD facial pattern - dark chin/throat -->
  <path d="M44 50 Q52 58 60 50 Q58 46 52 46 Q46 46 44 50 Z" fill="url(#g_quail_mask)" fill-opacity="0.8"/>

  <!-- HEAD face - white/cream supercilium stripe -->
  <path d="M36 42 Q42 38 50 39 Q56 39 60 41 Q58 38 52 36 Q44 35 38 39 Z" fill="#e4cfa4" fill-opacity="0.7" stroke="#C4A868" stroke-width="0.3"/>

  <!-- Dark crown patch -->
  <path d="M44 32 Q52 28 60 32 Q58 36 52 37 Q46 37 44 32 Z" fill="#3A1808" fill-opacity="0.85"/>

  <!-- HEAD eye -->
  <circle cx="44" cy="41" r="5" fill="#2A1808"/>
  <circle cx="44" cy="41" r="4" fill="url(#g_quail_eye)"/>
  <circle cx="42.5" cy="39.5" r="1.5" fill="#FFFFFF" fill-opacity="0.9"/>
  <circle cx="45.5" cy="42" r="0.7" fill="#FFFFFF" fill-opacity="0.5"/>

  <!-- Eye ring -->
  <circle cx="44" cy="41" r="5" fill="none" stroke="#1A0A04" stroke-width="0.8"/>

  <!-- TOPKNOT PLUME - signature quail feature -->
  <!-- Plume stem -->
  <path d="M52 28 Q50 18 48 10 Q50 8 52 10 Q54 18 54 28 Z" fill="url(#g_quail_plume)" stroke="#1A0A04" stroke-width="0.5"/>
  <!-- Plume teardrop tip -->
  <ellipse cx="50" cy="8" rx="5" ry="8" transform="rotate(-10 50 8)" fill="url(#g_quail_plume)" stroke="#1A0A04" stroke-width="0.8"/>
  <!-- Plume sheen (matte) -->
  <ellipse cx="48.5" cy="7" rx="2" ry="3.5" transform="rotate(-10 48.5 7)" fill="#FFFFFF" fill-opacity="0.12"/>

  <!-- BEAK -->
  <path d="M35 44 Q32 46 30 48 Q32 50 35 48 Q37 46 36 44 Z" fill="url(#g_quail_beak)" stroke="#3A2810" stroke-width="0.6"/>

  <!-- LEGS -->
  <!-- Left leg -->
  <line x1="53" y1="102" x2="48" y2="114" stroke="url(#g_quail_leg)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Left foot toes -->
  <line x1="48" y1="114" x2="40" y2="117" stroke="url(#g_quail_leg)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="48" y1="114" x2="47" y2="119" stroke="url(#g_quail_leg)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="48" y1="114" x2="54" y2="118" stroke="url(#g_quail_leg)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="48" y1="114" x2="42" y2="112" stroke="url(#g_quail_leg)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Right leg -->
  <line x1="62" y1="103" x2="60" y2="114" stroke="url(#g_quail_leg)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right foot toes -->
  <line x1="60" y1="114" x2="53" y2="117" stroke="url(#g_quail_leg)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="60" y1="114" x2="60" y2="119" stroke="url(#g_quail_leg)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="60" y1="114" x2="66" y2="118" stroke="url(#g_quail_leg)" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="60" y1="114" x2="55" y2="112" stroke="url(#g_quail_leg)" stroke-width="1.5" stroke-linecap="round"/>

</svg>
