<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="g_steak_base" cx="50%" cy="45%" r="55%" fx="40%" fy="35%">
      <stop offset="0%" stop-color="#c15f50"/>
      <stop offset="35%" stop-color="#a23f34"/>
      <stop offset="70%" stop-color="#822a20"/>
      <stop offset="100%" stop-color="#5e1a13"/>
    </radialGradient>
    <radialGradient id="g_steak_sheen" cx="38%" cy="30%" r="42%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g_steak_sear_top" cx="50%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#7b2a1a"/>
      <stop offset="40%" stop-color="#5c1f12"/>
      <stop offset="100%" stop-color="#3d1409"/>
    </radialGradient>
    <linearGradient id="g_steak_shadow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#1a0a05" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1a0a05" stop-opacity="0.05"/>
    </linearGradient>
    <radialGradient id="g_steak_vignette" cx="50%" cy="45%" r="58%">
      <stop offset="62%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#2e0a07" stop-opacity="0.30"/>
    </radialGradient>
    <radialGradient id="g_steak_drop_shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.0"/>
    </filter>
    <clipPath id="clip_steak">
      <path d="M20 58 C18 45 26 32 40 26 C50 21 62 20 74 22 C86 24 96 28 103 37 C110 47 111 59 107 69 C103 80 93 88 79 92 C67 96 53 96 41 91 C27 85 21 71 20 58 Z"/>
    </clipPath>
  </defs>

  <!-- Drop shadow -->
  <ellipse cx="64" cy="108" rx="44" ry="8" fill="url(#g_steak_drop_shadow)"/>

  <!-- Main steak body - outer dark contour -->
  <path d="M18 58 C16 44 24 30 38 24 C48 19 60 18 72 20 C84 22 95 26 102 35 C110 45 112 57 108 68 C104 79 94 87 80 91 C68 95 54 95 42 90 C28 84 19 72 18 58 Z" fill="#2d0f08" opacity="0.6"/>

  <!-- Main steak body - base color -->
  <path d="M20 58 C18 45 26 32 40 26 C50 21 62 20 74 22 C86 24 96 28 103 37 C110 47 111 59 107 69 C103 80 93 88 79 92 C67 96 53 96 41 91 C27 85 21 71 20 58 Z" fill="url(#g_steak_base)"/>

  <!-- Seared top crust layer -->
  <path d="M20 58 C18 45 26 32 40 26 C50 21 62 20 74 22 C86 24 96 28 103 37 C110 47 111 59 107 69 C103 80 93 88 79 92 C67 96 53 96 41 91 C27 85 21 71 20 58 Z" fill="url(#g_steak_shadow)" opacity="0.45"/>

  <!-- Marmoleo natural: manchas suaves desenfocadas (grasa), recortadas a la carne -->
  <g clip-path="url(#clip_steak)" filter="url(#soft)" opacity="0.5">
    <path d="M 34 66 Q 46 60 56 65 Q 64 69 72 64 Q 80 60 88 65 Q 82 68 74 67 Q 64 66 56 70 Q 46 74 38 69 Q 34 68 34 66 Z" fill="#ece1cd"/>
    <path d="M 44 40 Q 54 36 66 40 Q 74 43 80 49 Q 72 46 62 44 Q 52 43 46 44 Q 44 43 44 40 Z" fill="#e7dbc4"/>
    <path d="M 40 78 Q 52 74 62 78 Q 70 81 80 77 Q 72 82 62 82 Q 52 82 44 82 Q 40 81 40 78 Z" fill="#e7dbc4"/>
    <ellipse cx="86" cy="60" rx="6" ry="3" transform="rotate(20 86 60)" fill="#e7dbc4"/>
    <ellipse cx="46" cy="52" rx="6" ry="3" transform="rotate(-15 46 52)" fill="#e7dbc4"/>
  </g>

  <!-- Sear grill marks - main diagonal (dark, natural) -->
  <path d="M36 36 C44 44 52 54 56 66" stroke="#2d0a05" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M52 30 C60 38 68 48 72 60" stroke="#2d0a05" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.45"/>
  <path d="M68 27 C76 35 84 46 86 58" stroke="#2d0a05" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.4"/>

  <!-- Top edge crust definition (muted, no plastic) -->
  <path d="M40 26 C50 21 62 20 74 22 C86 24 96 28 103 37" stroke="#a5544a" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3"/>

  <!-- Vignette (volumen mate) -->
  <path d="M20 58 C18 45 26 32 40 26 C50 21 62 20 74 22 C86 24 96 28 103 37 C110 47 111 59 107 69 C103 80 93 88 79 92 C67 96 53 96 41 91 C27 85 21 71 20 58 Z" fill="url(#g_steak_vignette)"/>

  <!-- Sheen mate muy sutil -->
  <path d="M20 58 C18 45 26 32 40 26 C50 21 62 20 74 22 C86 24 96 28 103 37 C110 47 111 59 107 69 C103 80 93 88 79 92 C67 96 53 96 41 91 C27 85 21 71 20 58 Z" fill="url(#g_steak_sheen)"/>

  <!-- Outer edge contour refinement -->
  <path d="M20 58 C18 45 26 32 40 26 C50 21 62 20 74 22 C86 24 96 28 103 37 C110 47 111 59 107 69 C103 80 93 88 79 92 C67 96 53 96 41 91 C27 85 21 71 20 58 Z" fill="none" stroke="#2d0a05" stroke-width="1.5" opacity="0.55"/>
</svg>
