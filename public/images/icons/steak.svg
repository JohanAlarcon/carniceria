  <path d="M52 30 C60 38 68 48 72 60" stroke="#2d0a05" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M68 27 C76 35 84 46 86 58" stroke="#2d0a05" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.45"/>

