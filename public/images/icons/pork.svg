    </clipPath>
  </defs>

  <!-- Hueso -->
  <rect x="72" y="18" width="14" height="56" rx="7" ry="7" fill="url(#g_pork_bone)" stroke="#bba572" stroke-width="1"/>
  <ellipse cx="79" cy="20" rx="13" ry="12" fill="url(#g_pork_boneball)" stroke="#bba572" stroke-width="1"/>
  <ellipse cx="75" cy="16" rx="4.5" ry="3.5" fill="#fffdf6" fill-opacity="0.45"/>
  <ellipse cx="79" cy="72" rx="13" ry="12" fill="url(#g_pork_boneball)" stroke="#bba572" stroke-width="1"/>
  <ellipse cx="75" cy="68" rx="4.5" ry="3.5" fill="#fffdf6" fill-opacity="0.4"/>

  <!-- Cofia de grasa -->
  <path d="M 30 52 Q 28 34 40 26 Q 54 18 70 22 Q 78 24 79 32 Q 76 30 68 28 Q 54 24 42 30 Q 34 36 34 52 Z"
