<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="g_pork_meat" cx="45%" cy="40%" r="55%" fx="35%" fy="30%">
      <stop offset="0%" stop-color="#f4a0a8"/>
      <stop offset="40%" stop-color="#e8737e"/>
      <stop offset="75%" stop-color="#d4545f"/>
      <stop offset="100%" stop-color="#b83a45"/>
    </radialGradient>
    <radialGradient id="g_pork_highlight" cx="35%" cy="28%" r="30%">
      <stop offset="0%" stop-color="#ffd0d5" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffd0d5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g_pork_fat1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff5f0"/>
      <stop offset="50%" stop-color="#ffe8e0"/>
      <stop offset="100%" stop-color="#f5d8cc"/>
    </linearGradient>
    <linearGradient id="g_pork_fat2" x1="0%" y1="0%" x2="100%" y2="80%">
      <stop offset="0%" stop-color="#fff0ea"/>
      <stop offset="100%" stop-color="#f0cfc0"/>
    </linearGradient>
    <radialGradient id="g_pork_bone" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#fff9f0"/>
      <stop offset="40%" stop-color="#f5e8d0"/>
      <stop offset="100%" stop-color="#d8c4a0"/>
    </radialGradient>
    <radialGradient id="g_pork_boneball1" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#fffaf2"/>
      <stop offset="60%" stop-color="#ede0c4"/>
      <stop offset="100%" stop-color="#c8b080"/>
    </radialGradient>
    <radialGradient id="g_pork_boneball2" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#fffaf2"/>
      <stop offset="60%" stop-color="#ede0c4"/>
      <stop offset="100%" stop-color="#c8b080"/>
    </radialGradient>
    <linearGradient id="g_pork_shadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8b2530" stop-opacity="0"/>
      <stop offset="100%" stop-color="#6a1520" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="g_pork_marbling" cx="60%" cy="55%" r="40%">
      <stop offset="0%" stop-color="#ffeef0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffeef0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Bone shaft -->
  <rect x="72" y="18" width="14" height="56" rx="7" ry="7"
        fill="url(#g_pork_bone)" stroke="#c0a870" stroke-width="1"/>

  <!-- Bone ball top -->
  <ellipse cx="79" cy="20" rx="13" ry="12"
           fill="url(#g_pork_boneball1)" stroke="#c0a870" stroke-width="1"/>
  <!-- Bone ball top highlight -->
  <ellipse cx="75" cy="16" rx="5" ry="4" fill="#fffdf8" fill-opacity="0.6"/>

  <!-- Bone ball bottom -->
  <ellipse cx="79" cy="72" rx="13" ry="12"
           fill="url(#g_pork_boneball2)" stroke="#c0a870" stroke-width="1"/>
  <!-- Bone ball bottom highlight -->
  <ellipse cx="75" cy="68" rx="5" ry="4" fill="#fffdf8" fill-opacity="0.5"/>

  <!-- Fat cap (outer fat layer along top/right of chop) -->
  <path d="M 30 52 Q 28 34 40 26 Q 54 18 70 22 Q 78 24 79 32 Q 76 30 68 28 Q 54 24 42 30 Q 34 36 34 52 Z"
        fill="url(#g_pork_fat1)" stroke="#c8a888" stroke-width="0.8"/>

  <!-- Main chop body -->
  <path d="M 34 52 Q 32 72 36 88 Q 42 104 60 110 Q 76 114 88 104 Q 100 94 98 76 Q 96 60 88 52 Q 82 44 74 42 Q 68 40 60 42 Q 46 44 34 52 Z"
        fill="url(#g_pork_meat)" stroke="#9e2d3a" stroke-width="1.2"/>

  <!-- Shadow overlay bottom -->
  <path d="M 34 52 Q 32 72 36 88 Q 42 104 60 110 Q 76 114 88 104 Q 100 94 98 76 Q 96 60 88 52 Q 82 44 74 42 Q 68 40 60 42 Q 46 44 34 52 Z"
        fill="url(#g_pork_shadow)"/>

  <!-- Marbling veins (fat streaks) -->
  <path d="M 50 55 Q 58 50 68 56 Q 74 60 70 68 Q 64 72 56 68 Q 48 62 50 55 Z"
        fill="#fce8ea" fill-opacity="0.5" stroke="#f0d0d4" stroke-width="0.5"/>
  <path d="M 60 72 Q 70 68 78 74 Q 82 80 76 86 Q 68 90 62 86 Q 56 80 60 72 Z"
        fill="#fce8ea" fill-opacity="0.4" stroke="#f0d0d4" stroke-width="0.4"/>
  <path d="M 42 70 Q 48 66 54 72 Q 56 78 50 82 Q 44 82 42 76 Q 40 72 42 70 Z"
        fill="#fce8ea" fill-opacity="0.35" stroke="#f0d0d4" stroke-width="0.4"/>

  <!-- Thin marbling lines -->
  <path d="M 48 58 Q 56 54 64 60" fill="none" stroke="#f8dce0" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M 52 68 Q 62 64 72 70" fill="none" stroke="#f8dce0" stroke-width="1" stroke-linecap="round"/>
  <path d="M 58 80 Q 66 76 74 82" fill="none" stroke="#f8dce0" stroke-width="0.9" stroke-linecap="round"/>
  <path d="M 44 80 Q 50 76 56 80" fill="none" stroke="#f8dce0" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Highlight on meat surface -->
  <path d="M 34 52 Q 32 72 36 88 Q 42 104 60 110 Q 76 114 88 104 Q 100 94 98 76 Q 96 60 88 52 Q 82 44 74 42 Q 68 40 60 42 Q 46 44 34 52 Z"
        fill="url(#g_pork_highlight)"/>

  <!-- Fat cap bottom edge highlight -->
  <path d="M 42 30 Q 54 24 68 28 Q 76 30 78 36"
        fill="none" stroke="#fff5ee" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>

  <!-- Sear/grill marks subtle -->
  <path d="M 50 62 Q 54 58 60 64 Q 58 68 52 66 Z"
        fill="#c04050" fill-opacity="0.18"/>
  <path d="M 68 78 Q 72 74 78 80 Q 76 84 70 82 Z"
        fill="#c04050" fill-opacity="0.15"/>
</svg>