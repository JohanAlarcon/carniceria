  <path d="M 34 52 Q 32 72 36 88 Q 42 104 60 110 Q 76 114 88 104 Q 100 94 98 76 Q 96 60 88 52 Q 82 44 74 42 Q 68 40 60 42 Q 46 44 34 52 Z"
