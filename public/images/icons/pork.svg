<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="g_pork_meat" cx="45%" cy="40%" r="58%" fx="38%" fy="32%">
      <stop offset="0%" stop-color="#e0978c"/>
      <stop offset="40%" stop-color="#cf7669"/>
      <stop offset="75%" stop-color="#b95a4d"/>
      <stop offset="100%" stop-color="#9c4438"/>
    </radialGradient>
    <radialGradient id="g_pork_highlight" cx="38%" cy="28%" r="34%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g_pork_fat1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6ece2"/>
      <stop offset="50%" stop-color="#efe0d2"/>
      <stop offset="100%" stop-color="#e3cdba"/>
    </linearGradient>
    <radialGradient id="g_pork_bone" cx="50%" cy="35%" r="55%">
