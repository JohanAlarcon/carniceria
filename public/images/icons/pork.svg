  <!-- Marmoleo suave desenfocado -->
  <g clip-path="url(#clip_pork)" filter="url(#soft)" opacity="0.5">
    <path d="M 50 55 Q 60 51 70 57 Q 66 62 58 60 Q 50 59 50 55 Z" fill="#f4e7dd"/>
    <path d="M 46 72 Q 56 68 66 73 Q 60 78 52 76 Q 46 75 46 72 Z" fill="#efe0d3"/>
    <path d="M 62 84 Q 72 80 80 85 Q 74 89 66 87 Q 62 86 62 84 Z" fill="#efe0d3"/>
    <ellipse cx="48" cy="84" rx="5" ry="2.6" fill="#efe0d3"/>
  </g>

  <!-- Vignette + sheen mate -->
  <path d="M 34 52 Q 32 72 36 88 Q 42 104 60 110 Q 76 114 88 104 Q 100 94 98 76 Q 96 60 88 52 Q 82 44 74 42 Q 68 40 60 42 Q 46 44 34 52 Z"
