<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="g_beef_main" cx="45%" cy="38%" r="64%" fx="40%" fy="32%">
      <stop offset="0%" stop-color="#c15f50"/>
      <stop offset="40%" stop-color="#a23f34"/>
      <stop offset="74%" stop-color="#822a20"/>
      <stop offset="100%" stop-color="#5e1a13"/>
    </radialGradient>
    <linearGradient id="g_beef_edge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5c1811"/>
      <stop offset="100%" stop-color="#390d09"/>
    </linearGradient>
    <linearGradient id="g_beef_fatcap" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ecdfc7"/>
      <stop offset="50%" stop-color="#ddcaa6"/>
      <stop offset="100%" stop-color="#c6ab81"/>
    </linearGradient>
    <radialGradient id="g_beef_sheen" cx="40%" cy="28%" r="46%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g_beef_vignette" cx="50%" cy="45%" r="58%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#2e0a07" stop-opacity="0.32"/>
    </radialGradient>
    <radialGradient id="g_beef_shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a0a" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#1a0a0a" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.1"/>
    </filter>
    <clipPath id="clip_beef">
      <path d="M 18 72 Q 14 58 20 46 Q 26 34 40 26 Q 52 20 64 20 Q 78 20 90 26 Q 104 34 108 48 Q 114 62 110 74 Q 104 85 88 89 Q 76 92 64 91 Q 50 91 38 88 Q 24 84 18 72 Z"/>
    </clipPath>
  </defs>

  <ellipse cx="64" cy="112" rx="46" ry="7" fill="url(#g_beef_shadow)"/>

  <path d="M 18 78 Q 16 88 22 95 Q 35 105 64 106 Q 93 105 106 95 Q 112 88 110 78 Q 95 88 64 89 Q 33 88 18 78 Z" fill="url(#g_beef_edge)"/>

  <path d="M 18 72 Q 14 58 20 46 Q 26 34 40 26 Q 52 20 64 20 Q 78 20 90 26 Q 104 34 108 48 Q 114 62 110 74 Q 104 85 88 89 Q 76 92 64 91 Q 50 91 38 88 Q 24 84 18 72 Z" fill="url(#g_beef_main)"/>

  <!-- Marmoleo natural: manchas suaves desenfocadas (grasa), recortadas a la carne -->
  <g clip-path="url(#clip_beef)" filter="url(#soft)" opacity="0.5">
    <path d="M 30 50 Q 42 45 52 51 Q 60 56 68 51 Q 76 47 84 52 Q 80 55 72 54 Q 62 53 54 57 Q 44 61 36 56 Q 31 54 30 50 Z" fill="#ece1cd"/>
    <path d="M 34 62 Q 44 58 54 62 Q 62 66 70 61 Q 66 65 58 65 Q 48 65 40 66 Q 35 66 34 62 Z" fill="#e7dbc4"/>
    <path d="M 46 34 Q 56 31 66 35 Q 62 38 54 37 Q 48 37 46 34 Z" fill="#e7dbc4"/>
    <ellipse cx="76" cy="70" rx="6" ry="3" transform="rotate(12 76 70)" fill="#e7dbc4"/>
    <ellipse cx="40" cy="70" rx="5" ry="2.6" fill="#e7dbc4"/>
  </g>
  <!-- Cofia de grasa -->
  <path d="M 90 26 Q 104 34 108 48 Q 114 62 110 74 Q 106 80 100 83 Q 108 70 106 52 Q 103 38 92 30 Z" fill="url(#g_beef_fatcap)" stroke="#bfa274" stroke-width="0.5"/>

  <!-- Vignette (volumen sin plástico) -->
  <path d="M 18 72 Q 14 58 20 46 Q 26 34 40 26 Q 52 20 64 20 Q 78 20 90 26 Q 104 34 108 48 Q 114 62 110 74 Q 104 85 88 89 Q 76 92 64 91 Q 50 91 38 88 Q 24 84 18 72 Z" fill="url(#g_beef_vignette)"/>
  <!-- Sheen mate muy sutil -->
  <path d="M 18 72 Q 14 58 20 46 Q 26 34 40 26 Q 52 20 64 20 Q 78 20 90 26 Q 104 34 108 48 Q 114 62 110 74 Q 104 85 88 89 Q 76 92 64 91 Q 50 91 38 88 Q 24 84 18 72 Z" fill="url(#g_beef_sheen)"/>

  <path d="M 18 72 Q 14 58 20 46 Q 26 34 40 26 Q 52 20 64 20 Q 78 20 90 26 Q 104 34 108 48 Q 114 62 110 74 Q 104 85 88 89 Q 76 92 64 91 Q 50 91 38 88 Q 24 84 18 72 Z" fill="none" stroke="#390d09" stroke-width="1.1" opacity="0.55"/>
</svg>
