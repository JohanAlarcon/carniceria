<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Main sausage body gradient - deep red chorizo color -->
    <linearGradient id="g_sausage_top1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="30%" stop-color="#e74c3c"/>
      <stop offset="60%" stop-color="#a93226"/>
      <stop offset="100%" stop-color="#7b241c"/>
    </linearGradient>
    <linearGradient id="g_sausage_top2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="30%" stop-color="#e74c3c"/>
      <stop offset="60%" stop-color="#a93226"/>
      <stop offset="100%" stop-color="#7b241c"/>
    </linearGradient>
    <linearGradient id="g_sausage_bot1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#922b21"/>
      <stop offset="35%" stop-color="#c0392b"/>
      <stop offset="65%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#7b241c"/>
    </linearGradient>
    <linearGradient id="g_sausage_bot2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#922b21"/>
      <stop offset="35%" stop-color="#c0392b"/>
      <stop offset="65%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#7b241c"/>
    </linearGradient>
    <!-- Highlight gradient for sheen on sausage -->
    <linearGradient id="g_sausage_shine1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1948a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f1948a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="g_sausage_shine2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1948a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f1948a" stop-opacity="0"/>
    </linearGradient>
    <!-- Tie/knot gradient -->
    <linearGradient id="g_sausage_tie" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6e2018"/>
      <stop offset="50%" stop-color="#922b21"/>
      <stop offset="100%" stop-color="#5a1a10"/>
    </linearGradient>
    <!-- Fat marbling spots gradient -->
    <radialGradient id="g_sausage_marble" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5cba7" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f5cba7" stop-opacity="0"/>
    </radialGradient>
    <!-- End cap gradient -->
    <radialGradient id="g_sausage_end" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#6e2018"/>
    </radialGradient>
    <!-- Shadow beneath sausages -->
    <radialGradient id="g_sausage_shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a08" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1a0a08" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Drop shadow -->
  <ellipse cx="64" cy="112" rx="48" ry="8" fill="url(#g_sausage_shadow)"/>

  <!-- === TOP ROW SAUSAGES === -->

  <!-- Top-left sausage -->
  <g>
    <rect x="12" y="28" width="46" height="22" rx="11" ry="11" fill="url(#g_sausage_top1)" stroke="#5a1a10" stroke-width="1.2"/>
    <!-- shine -->
    <rect x="16" y="30" width="38" height="8" rx="4" fill="url(#g_sausage_shine1)" opacity="0.7"/>
    <!-- marbling veins -->
    <path d="M22 35 Q30 31 38 36 Q44 38 50 34" stroke="#f5cba7" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M26 40 Q34 44 42 40" stroke="#f5cba7" stroke-width="0.8" fill="none" opacity="0.3"/>
    <!-- end caps -->
    <ellipse cx="12" cy="39" rx="5" ry="11" fill="url(#g_sausage_end)" stroke="#5a1a10" stroke-width="1"/>
    <ellipse cx="58" cy="39" rx="5" ry="11" fill="url(#g_sausage_end)" stroke="#5a1a10" stroke-width="1"/>
  </g>

  <!-- Top-right sausage -->
  <g>
    <rect x="70" y="28" width="46" height="22" rx="11" ry="11" fill="url(#g_sausage_top2)" stroke="#5a1a10" stroke-width="1.2"/>
    <!-- shine -->
    <rect x="74" y="30" width="38" height="8" rx="4" fill="url(#g_sausage_shine2)" opacity="0.7"/>
    <!-- marbling veins -->
    <path d="M80 35 Q88 31 96 36 Q102 38 110 34" stroke="#f5cba7" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M84 40 Q92 44 100 40" stroke="#f5cba7" stroke-width="0.8" fill="none" opacity="0.3"/>
    <!-- end caps -->
    <ellipse cx="70" cy="39" rx="5" ry="11" fill="url(#g_sausage_end)" stroke="#5a1a10" stroke-width="1"/>
    <ellipse cx="116" cy="39" rx="5" ry="11" fill="url(#g_sausage_end)" stroke="#5a1a10" stroke-width="1"/>
  </g>

  <!-- Center tie between top sausages -->
  <g>
    <ellipse cx="64" cy="39" rx="5" ry="9" fill="url(#g_sausage_tie)" stroke="#3d0f08" stroke-width="1.2"/>
    <!-- tie highlights -->
    <ellipse cx="63" cy="36" rx="2" ry="3" fill="#a93226" opacity="0.6"/>
  </g>

  <!-- === BOTTOM ROW SAUSAGES === -->

  <!-- Bottom-left sausage -->
  <g>
    <rect x="12" y="78" width="46" height="22" rx="11" ry="11" fill="url(#g_sausage_bot1)" stroke="#5a1a10" stroke-width="1.2"/>
    <!-- shine -->
    <rect x="16" y="80" width="38" height="8" rx="4" fill="url(#g_sausage_shine1)" opacity="0.7"/>
    <!-- marbling -->
    <path d="M20 85 Q29 81 38 86 Q44 89 52 84" stroke="#f5cba7" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M24 91 Q33 94 44 90" stroke="#f5cba7" stroke-width="0.8" fill="none" opacity="0.3"/>
    <!-- end caps -->
    <ellipse cx="12" cy="89" rx="5" ry="11" fill="url(#g_sausage_end)" stroke="#5a1a10" stroke-width="1"/>
    <ellipse cx="58" cy="89" rx="5" ry="11" fill="url(#g_sausage_end)" stroke="#5a1a10" stroke-width="1"/>
  </g>

  <!-- Bottom-right sausage -->
  <g>
    <rect x="70" y="78" width="46" height="22" rx="11" ry="11" fill="url(#g_sausage_bot2)" stroke="#5a1a10" stroke-width="1.2"/>
    <!-- shine -->
    <rect x="74" y="80" width="38" height="8" rx="4" fill="url(#g_sausage_shine2)" opacity="0.7"/>
    <!-- marbling -->
    <path d="M78 85 Q87 81 96 86 Q102 89 112 84" stroke="#f5cba7" stroke-width="1" fill="none" opacity="0.4"/>
    <path d="M82 91 Q91 94 102 90" stroke="#f5cba7" stroke-width="0.8" fill="none" opacity="0.3"/>
    <!-- end caps -->
    <ellipse cx="70" cy="89" rx="5" ry="11" fill="url(#g_sausage_end)" stroke="#5a1a10" stroke-width="1"/>
    <ellipse cx="116" cy="89" rx="5" ry="11" fill="url(#g_sausage_end)" stroke="#5a1a10" stroke-width="1"/>
  </g>

  <!-- Center tie between bottom sausages -->
  <g>
    <ellipse cx="64" cy="89" rx="5" ry="9" fill="url(#g_sausage_tie)" stroke="#3d0f08" stroke-width="1.2"/>
    <ellipse cx="63" cy="86" rx="2" ry="3" fill="#a93226" opacity="0.6"/>
  </g>

  <!-- === VERTICAL TIE connecting top-row to bottom-row === -->
  <g>
    <!-- Left vertical connector -->
    <rect x="32" y="49" width="10" height="30" rx="5" fill="url(#g_sausage_tie)" stroke="#3d0f08" stroke-width="1"/>
    <!-- Right vertical connector -->
    <rect x="86" y="49" width="10" height="30" rx="5" fill="url(#g_sausage_tie)" stroke="#3d0f08" stroke-width="1"/>
    <!-- Center bow knot -->
    <ellipse cx="37" cy="64" rx="6" ry="5" fill="url(#g_sausage_tie)" stroke="#3d0f08" stroke-width="1"/>
    <ellipse cx="91" cy="64" rx="6" ry="5" fill="url(#g_sausage_tie)" stroke="#3d0f08" stroke-width="1"/>
    <!-- Knot highlight -->
    <ellipse cx="36" cy="62" rx="2.5" ry="2" fill="#a93226" opacity="0.55"/>
    <ellipse cx="90" cy="62" rx="2.5" ry="2" fill="#a93226" opacity="0.55"/>
  </g>
</svg>