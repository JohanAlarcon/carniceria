<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Main sausage body gradient - cured chorizo, natural desaturated brown-red -->
    <linearGradient id="g_sausage_top1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b5654e"/>
      <stop offset="30%" stop-color="#a85340"/>
      <stop offset="60%" stop-color="#96432f"/>
      <stop offset="100%" stop-color="#7d3524"/>
    </linearGradient>
    <linearGradient id="g_sausage_top2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b5654e"/>
      <stop offset="30%" stop-color="#a85340"/>
      <stop offset="60%" stop-color="#96432f"/>
      <stop offset="100%" stop-color="#7d3524"/>
    </linearGradient>
    <linearGradient id="g_sausage_bot1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8f3f2d"/>
      <stop offset="35%" stop-color="#a85340"/>
      <stop offset="65%" stop-color="#b5654e"/>
      <stop offset="100%" stop-color="#7d3524"/>
    </linearGradient>
    <linearGradient id="g_sausage_bot2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8f3f2d"/>
      <stop offset="35%" stop-color="#a85340"/>
      <stop offset="65%" stop-color="#b5654e"/>
      <stop offset="100%" stop-color="#7d3524"/>
    </linearGradient>
    <!-- De-glossed sheen: very subtle white, fades to 0 -->
    <linearGradient id="g_sausage_shine1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="g_sausage_shine2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Tie/knot gradient - dark cured casing -->
    <linearGradient id="g_sausage_tie" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5a271b"/>
      <stop offset="50%" stop-color="#7d3a2a"/>
      <stop offset="100%" stop-color="#46180f"/>
    </linearGradient>
    <!-- End cap gradient - natural cured -->
    <radialGradient id="g_sausage_end" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a5533d"/>
      <stop offset="100%" stop-color="#6e2b1e"/>
    </radialGradient>
    <!-- Vignette for matte volume -->
    <radialGradient id="g_sausage_vignette" cx="50%" cy="45%" r="62%">
      <stop offset="62%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#3a1810" stop-opacity="0.30"/>
    </radialGradient>
    <!-- Shadow beneath sausages -->
    <radialGradient id="g_sausage_shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a08" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1a0a08" stop-opacity="0"/>
    </radialGradient>
    <!-- Soft blur for fat marbling -->
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.0"/>
    </filter>
    <clipPath id="clip_s_tl"><rect x="12" y="28" width="46" height="22" rx="11" ry="11"/></clipPath>
    <clipPath id="clip_s_tr"><rect x="70" y="28" width="46" height="22" rx="11" ry="11"/></clipPath>
    <clipPath id="clip_s_bl"><rect x="12" y="78" width="46" height="22" rx="11" ry="11"/></clipPath>
    <clipPath id="clip_s_br"><rect x="70" y="78" width="46" height="22" rx="11" ry="11"/></clipPath>
  </defs>

  <!-- Drop shadow -->
  <ellipse cx="64" cy="112" rx="48" ry="8" fill="url(#g_sausage_shadow)"/>

  <!-- === TOP ROW SAUSAGES === -->

  <!-- Top-left sausage -->
  <g>
    <rect x="12" y="28" width="46" height="22" rx="11" ry="11" fill="url(#g_sausage_top1)" stroke="#4a1f14" stroke-width="1.2"/>
    <!-- soft fat marbling -->
    <g clip-path="url(#clip_s_tl)" filter="url(#soft)" opacity="0.5">
      <ellipse cx="24" cy="36" rx="6" ry="2.3" fill="#ece1cd"/>
      <ellipse cx="40" cy="42" rx="7" ry="2.1" fill="#efe0d3"/>
      <ellipse cx="33" cy="38" rx="4.5" ry="1.6" fill="#e7dbc4"/>
      <ellipse cx="49" cy="35" rx="4" ry="1.8" fill="#e7dbc4"/>
    </g>
    <!-- vignette -->
    <rect x="12" y="28" width="46" height="22" rx="11" ry="11" fill="url(#g_sausage_vignette)"/>
    <!-- subtle sheen -->
    <rect x="16" y="30" width="38" height="8" rx="4" fill="url(#g_sausage_shine1)" opacity="0.8"/>
    <!-- end caps -->
    <ellipse cx="12" cy="39" rx="5" ry="11" fill="url(#g_sausage_end)" stroke="#4a1f14" stroke-width="1"/>
    <ellipse cx="58" cy="39" rx="5" ry="11" fill="url(#g_sausage_end)" stroke="#4a1f14" stroke-width="1"/>
  </g>

  <!-- Top-right sausage -->
  <g>
    <rect x="70" y="28" width="46" height="22" rx="11" ry="11" fill="url(#g_sausage_top2)" stroke="#4a1f14" stroke-width="1.2"/>
    <g clip-path="url(#clip_s_tr)" filter="url(#soft)" opacity="0.5">
      <ellipse cx="82" cy="36" rx="6" ry="2.3" fill="#ece1cd"/>
      <ellipse cx="98" cy="42" rx="7" ry="2.1" fill="#efe0d3"/>
      <ellipse cx="91" cy="38" rx="4.5" ry="1.6" fill="#e7dbc4"/>
      <ellipse cx="107" cy="35" rx="4" ry="1.8" fill="#e7dbc4"/>
    </g>
    <rect x="70" y="28" width="46" height="22" rx="11" ry="11" fill="url(#g_sausage_vignette)"/>
    <rect x="74" y="30" width="38" height="8" rx="4" fill="url(#g_sausage_shine2)" opacity="0.8"/>
    <ellipse cx="70" cy="39" rx="5" ry="11" fill="url(#g_sausage_end)" stroke="#4a1f14" stroke-width="1"/>
    <ellipse cx="116" cy="39" rx="5" ry="11" fill="url(#g_sausage_end)" stroke="#4a1f14" stroke-width="1"/>
  </g>

  <!-- Center tie between top sausages -->
  <g>
    <ellipse cx="64" cy="39" rx="5" ry="9" fill="url(#g_sausage_tie)" stroke="#3d0f08" stroke-width="1.2"/>
    <!-- tie highlight -->
    <ellipse cx="63" cy="36" rx="2" ry="3" fill="#9c4a37" opacity="0.5"/>
  </g>

  <!-- === BOTTOM ROW SAUSAGES === -->

  <!-- Bottom-left sausage -->
  <g>
    <rect x="12" y="78" width="46" height="22" rx="11" ry="11" fill="url(#g_sausage_bot1)" stroke="#4a1f14" stroke-width="1.2"/>
    <g clip-path="url(#clip_s_bl)" filter="url(#soft)" opacity="0.5">
      <ellipse cx="24" cy="86" rx="6" ry="2.3" fill="#ece1cd"/>
      <ellipse cx="40" cy="92" rx="7" ry="2.1" fill="#efe0d3"/>
      <ellipse cx="33" cy="88" rx="4.5" ry="1.6" fill="#e7dbc4"/>
      <ellipse cx="49" cy="85" rx="4" ry="1.8" fill="#e7dbc4"/>
    </g>
    <rect x="12" y="78" width="46" height="22" rx="11" ry="11" fill="url(#g_sausage_vignette)"/>
    <rect x="16" y="80" width="38" height="8" rx="4" fill="url(#g_sausage_shine1)" opacity="0.8"/>
    <ellipse cx="12" cy="89" rx="5" ry="11" fill="url(#g_sausage_end)" stroke="#4a1f14" stroke-width="1"/>
    <ellipse cx="58" cy="89" rx="5" ry="11" fill="url(#g_sausage_end)" stroke="#4a1f14" stroke-width="1"/>
  </g>

  <!-- Bottom-right sausage -->
  <g>
    <rect x="70" y="78" width="46" height="22" rx="11" ry="11" fill="url(#g_sausage_bot2)" stroke="#4a1f14" stroke-width="1.2"/>
    <g clip-path="url(#clip_s_br)" filter="url(#soft)" opacity="0.5">
      <ellipse cx="82" cy="86" rx="6" ry="2.3" fill="#ece1cd"/>
      <ellipse cx="98" cy="92" rx="7" ry="2.1" fill="#efe0d3"/>
      <ellipse cx="91" cy="88" rx="4.5" ry="1.6" fill="#e7dbc4"/>
      <ellipse cx="107" cy="85" rx="4" ry="1.8" fill="#e7dbc4"/>
    </g>
    <rect x="70" y="78" width="46" height="22" rx="11" ry="11" fill="url(#g_sausage_vignette)"/>
    <rect x="74" y="80" width="38" height="8" rx="4" fill="url(#g_sausage_shine2)" opacity="0.8"/>
    <ellipse cx="70" cy="89" rx="5" ry="11" fill="url(#g_sausage_end)" stroke="#4a1f14" stroke-width="1"/>
    <ellipse cx="116" cy="89" rx="5" ry="11" fill="url(#g_sausage_end)" stroke="#4a1f14" stroke-width="1"/>
  </g>

  <!-- Center tie between bottom sausages -->
  <g>
    <ellipse cx="64" cy="89" rx="5" ry="9" fill="url(#g_sausage_tie)" stroke="#3d0f08" stroke-width="1.2"/>
    <ellipse cx="63" cy="86" rx="2" ry="3" fill="#9c4a37" opacity="0.5"/>
  </g>

  <!-- === VERTICAL TIE connecting top-row to bottom-row === -->
  <g>
    <!-- Left vertical connector -->
    <rect x="32" y="49" width="10" height="30" rx="5" fill="url(#g_sausage_tie)" stroke="#3d0f08" stroke-width="1"/>
    <!-- Right vertical connector -->
    <rect x="86" y="49" width="10" height="30" rx="5" fill="url(#g_sausage_tie)" stroke="#3d0f08" stroke-width="1"/>
    <!-- Center bow knot -->
    <ellipse cx="37" cy="64" rx="6" ry="5" fill="url(#g_sausage_tie)" stroke="#3d0f08" stroke-width="1"/>
    <ellipse cx="91" cy="64" rx="6" ry="5" fill="url(#g_sausage_tie)" stroke="#3d0f08" stroke-width="1"/>
    <!-- Knot highlight -->
    <ellipse cx="36" cy="62" rx="2.5" ry="2" fill="#9c4a37" opacity="0.5"/>
    <ellipse cx="90" cy="62" rx="2.5" ry="2" fill="#9c4a37" opacity="0.5"/>
  </g>
</svg>
