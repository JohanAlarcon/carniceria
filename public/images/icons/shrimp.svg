<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g_shrimp_body1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8C5A"/>
      <stop offset="40%" stop-color="#E8552A"/>
      <stop offset="100%" stop-color="#C03A10"/>
    </linearGradient>
    <linearGradient id="g_shrimp_body2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFAA7A"/>
      <stop offset="50%" stop-color="#FF7040"/>
      <stop offset="100%" stop-color="#D04820"/>
    </linearGradient>
    <radialGradient id="g_shrimp_shine" cx="35%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#FFCCA0" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#FF8850" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#CC4010" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g_shrimp_tail" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9966"/>
      <stop offset="100%" stop-color="#C03A10"/>
    </linearGradient>
    <linearGradient id="g_shrimp_head" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFAA80"/>
      <stop offset="100%" stop-color="#B83010"/>
    </linearGradient>
    <radialGradient id="g_shrimp_eye" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="100%" stop-color="#111"/>
    </radialGradient>
    <linearGradient id="g_shrimp_seg1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFBB88"/>
      <stop offset="100%" stop-color="#CC4418"/>
    </linearGradient>
    <linearGradient id="g_shrimp_belly" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD5AA"/>
      <stop offset="100%" stop-color="#FFAA70"/>
    </linearGradient>
  </defs>

  <!-- Tail fan -->
  <ellipse cx="98" cy="26" rx="10" ry="4" transform="rotate(-40 98 26)" fill="url(#g_shrimp_tail)" stroke="#9A2C08" stroke-width="0.6"/>
  <ellipse cx="104" cy="22" rx="9" ry="3.5" transform="rotate(-55 104 22)" fill="url(#g_shrimp_tail)" stroke="#9A2C08" stroke-width="0.6"/>
  <ellipse cx="106" cy="30" rx="9" ry="3.5" transform="rotate(-25 106 30)" fill="url(#g_shrimp_tail)" stroke="#9A2C08" stroke-width="0.6"/>

  <!-- Main body - curved shrimp shape -->
  <!-- Body segments from tail to head, curving -->
  <!-- Segment 1 (near tail) -->
  <path d="M88,30 Q92,22 98,25 Q96,33 90,36 Z" fill="url(#g_shrimp_seg1)" stroke="#9A2C08" stroke-width="0.7"/>
  <!-- Segment 2 -->
  <path d="M80,38 Q85,28 92,30 Q90,40 83,44 Z" fill="url(#g_shrimp_body1)" stroke="#9A2C08" stroke-width="0.7"/>
  <!-- Segment 3 -->
  <path d="M70,48 Q76,36 84,38 Q82,50 74,54 Z" fill="url(#g_shrimp_body2)" stroke="#9A2C08" stroke-width="0.7"/>
  <!-- Segment 4 -->
  <path d="M60,58 Q66,46 74,48 Q72,60 64,65 Z" fill="url(#g_shrimp_body1)" stroke="#9A2C08" stroke-width="0.7"/>
  <!-- Segment 5 -->
  <path d="M50,68 Q56,57 64,59 Q62,70 54,76 Z" fill="url(#g_shrimp_body2)" stroke="#9A2C08" stroke-width="0.7"/>
  <!-- Segment 6 -->
  <path d="M41,78 Q47,67 55,69 Q52,80 45,86 Z" fill="url(#g_shrimp_body1)" stroke="#9A2C08" stroke-width="0.7"/>
  <!-- Segment 7 -->
  <path d="M34,88 Q39,77 47,79 Q43,90 37,96 Z" fill="url(#g_shrimp_body2)" stroke="#9A2C08" stroke-width="0.7"/>

  <!-- Main outer body shell -->
  <path d="M95,27 Q105,18 108,25 Q100,40 88,50 Q75,62 62,72 Q50,82 40,92 Q32,100 28,104 Q22,108 20,102 Q22,94 30,88 Q40,80 52,70 Q65,59 76,47 Q86,36 95,27 Z"
        fill="url(#g_shrimp_body1)" stroke="#8B2208" stroke-width="1.2"/>

  <!-- Belly/underside lighter strip -->
  <path d="M93,30 Q98,22 103,27 Q95,42 83,53 Q70,65 57,75 Q44,85 34,94 Q27,100 25,98 Q28,92 36,86 Q46,78 59,68 Q72,57 82,46 Q90,38 93,30 Z"
        fill="url(#g_shrimp_belly)" stroke="none"/>

  <!-- Segment lines on body -->
  <path d="M88,32 Q82,42 73,50" fill="none" stroke="#9A2C08" stroke-width="1" stroke-linecap="round"/>
  <path d="M80,40 Q73,50 63,58" fill="none" stroke="#9A2C08" stroke-width="1" stroke-linecap="round"/>
  <path d="M70,50 Q63,60 53,68" fill="none" stroke="#9A2C08" stroke-width="1" stroke-linecap="round"/>
  <path d="M60,60 Q53,70 43,78" fill="none" stroke="#9A2C08" stroke-width="1" stroke-linecap="round"/>
  <path d="M50,70 Q43,80 34,88" fill="none" stroke="#9A2C08" stroke-width="1" stroke-linecap="round"/>

  <!-- Head/cephalothorax -->
  <path d="M20,102 Q14,108 12,104 Q12,96 18,90 Q24,84 30,88 Q26,94 20,102 Z"
        fill="url(#g_shrimp_head)" stroke="#8B2208" stroke-width="1.1"/>

  <!-- Rostrum (spike on head) -->
  <path d="M12,104 Q8,110 10,114 Q14,112 16,108 Q14,106 12,104 Z"
        fill="#CC4418" stroke="#8B2208" stroke-width="0.8"/>

  <!-- Antennae -->
  <path d="M14,102 Q8,94 6,82 Q8,74 12,70" fill="none" stroke="#CC5520" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M14,102 Q4,92 2,78 Q2,66 8,58" fill="none" stroke="#CC5520" stroke-width="1" stroke-linecap="round"/>

  <!-- Small walking legs -->
  <path d="M36,90 Q32,96 28,98" fill="none" stroke="#BB4015" stroke-width="0.9" stroke-linecap="round"/>
  <path d="M44,82 Q40,90 36,94" fill="none" stroke="#BB4015" stroke-width="0.9" stroke-linecap="round"/>
  <path d="M54,72 Q50,80 46,85" fill="none" stroke="#BB4015" stroke-width="0.9" stroke-linecap="round"/>
  <path d="M64,62 Q60,70 56,76" fill="none" stroke="#BB4015" stroke-width="0.9" stroke-linecap="round"/>
  <path d="M74,52 Q70,60 66,66" fill="none" stroke="#BB4015" stroke-width="0.9" stroke-linecap="round"/>

  <!-- Eye -->
  <circle cx="16" cy="99" r="3.2" fill="url(#g_shrimp_eye)" stroke="#333" stroke-width="0.5"/>
  <circle cx="15.2" cy="98.2" r="1" fill="#888" opacity="0.7"/>

  <!-- Shine/highlight overlay -->
  <path d="M95,27 Q105,18 108,25 Q100,40 88,50 Q75,62 62,72 Q50,82 40,92 Q32,100 28,104 Q22,108 20,102 Q22,94 30,88 Q40,80 52,70 Q65,59 76,47 Q86,36 95,27 Z"
        fill="url(#g_shrimp_shine)"/>
</svg>