<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <radialGradient id="g_ham_main" cx="45%" cy="40%" r="55%" fx="35%" fy="30%">
      <stop offset="0%" stop-color="#e0978c"/>
      <stop offset="40%" stop-color="#cf7669"/>
      <stop offset="75%" stop-color="#b95a4d"/>
      <stop offset="100%" stop-color="#9c4438"/>
    </radialGradient>
    <radialGradient id="g_ham_highlight" cx="38%" cy="28%" r="34%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g_ham_shadow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7d2018" stop-opacity="0"/>
      <stop offset="100%" stop-color="#5e130d" stop-opacity="0.34"/>
    </linearGradient>
    <linearGradient id="g_ham_fat1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6ece2"/>
      <stop offset="50%" stop-color="#efe0d3"/>
      <stop offset="100%" stop-color="#e3cdba"/>
    </linearGradient>
    <linearGradient id="g_ham_bone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5ecdb"/>
      <stop offset="40%" stop-color="#e6d6bd"/>
      <stop offset="100%" stop-color="#c6ab81"/>
    </linearGradient>
    <radialGradient id="g_ham_bone_end" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#f6efdf"/>
      <stop offset="60%" stop-color="#dcc8a8"/>
      <stop offset="100%" stop-color="#b89870"/>
    </radialGradient>
    <radialGradient id="g_ham_vignette" cx="50%" cy="45%" r="56%">
      <stop offset="62%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#3a120b" stop-opacity="0.28"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.0"/>
    </filter>
    <clipPath id="clip_ham">
      <path d="M 22 68
               C 18 52, 24 28, 44 18
               C 60 10, 80 14, 88 28
               C 96 42, 92 60, 86 70
               C 80 80, 70 88, 58 90
               C 44 92, 28 84, 22 68 Z"/>
    </clipPath>
  </defs>

  <!-- Shadow under ham -->
  <ellipse cx="62" cy="112" rx="38" ry="7" fill="#000000" fill-opacity="0.12"/>

  <!-- Bone shaft -->
  <rect x="74" y="58" width="14" height="42" rx="7" ry="7" fill="url(#g_ham_bone)" stroke="#bba572" stroke-width="0.8"/>

  <!-- Bone knuckle end (bottom) -->
  <ellipse cx="81" cy="100" rx="12" ry="11" fill="url(#g_ham_bone_end)" stroke="#bba572" stroke-width="0.8"/>
  <!-- Bone knuckle highlight -->
  <ellipse cx="77" cy="96" rx="5" ry="4" fill="#f7efe0" fill-opacity="0.4"/>

  <!-- Main ham body -->
  <path d="M 22 68
           C 18 52, 24 28, 44 18
           C 60 10, 80 14, 88 28
           C 96 42, 92 60, 86 70
           C 80 80, 70 88, 58 90
           C 44 92, 28 84, 22 68 Z"
        fill="url(#g_ham_main)"/>

  <!-- Marmoleo suave desenfocado (grasa), recortado a la carne -->
  <g clip-path="url(#clip_ham)" filter="url(#soft)" opacity="0.5">
    <path d="M 34 34 Q 46 30 58 35 Q 66 39 74 34 Q 70 38 62 38 Q 52 37 44 40 Q 37 42 34 34 Z" fill="#efe0d3"/>
    <path d="M 30 52 Q 42 47 54 52 Q 62 56 70 51 Q 66 55 58 55 Q 48 55 40 57 Q 33 58 30 52 Z" fill="#ece1cd"/>
    <path d="M 34 68 Q 44 64 54 68 Q 60 71 66 66 Q 62 70 54 70 Q 46 70 40 71 Q 36 71 34 68 Z" fill="#efe0d3"/>
    <ellipse cx="50" cy="26" rx="7" ry="3" fill="#e3cdba"/>
    <ellipse cx="40" cy="78" rx="5" ry="2.5" fill="#ece1cd"/>
  </g>

  <!-- Fat cap on skin side (top-right) -->
  <path d="M 60 14 C 72 10, 84 18, 88 28 C 92 38, 88 28, 82 22 C 76 16, 68 13, 60 14 Z"
        fill="url(#g_ham_fat1)" stroke="#c3a684" stroke-width="0.7" opacity="0.85"/>

  <!-- Shadow overlay -->
  <path d="M 22 68
           C 18 52, 24 28, 44 18
           C 60 10, 80 14, 88 28
           C 96 42, 92 60, 86 70
           C 80 80, 70 88, 58 90
           C 44 92, 28 84, 22 68 Z"
        fill="url(#g_ham_shadow)"/>

  <!-- Vignette (volumen mate sin plastico) -->
  <path d="M 22 68
           C 18 52, 24 28, 44 18
           C 60 10, 80 14, 88 28
           C 96 42, 92 60, 86 70
           C 80 80, 70 88, 58 90
           C 44 92, 28 84, 22 68 Z"
        fill="url(#g_ham_vignette)"/>

  <!-- Sheen mate muy sutil -->
  <path d="M 22 68
           C 18 52, 24 28, 44 18
           C 60 10, 80 14, 88 28
           C 96 42, 92 60, 86 70
           C 80 80, 70 88, 58 90
           C 44 92, 28 84, 22 68 Z"
        fill="url(#g_ham_highlight)"/>

  <!-- Contorno de definicion -->
  <path d="M 22 68
           C 18 52, 24 28, 44 18
           C 60 10, 80 14, 88 28
           C 96 42, 92 60, 86 70
           C 80 80, 70 88, 58 90
           C 44 92, 28 84, 22 68 Z"
        fill="none" stroke="#7a2a20" stroke-width="1.2" opacity="0.55"/>

  <!-- Bone knuckle top -->
  <ellipse cx="81" cy="61" rx="9" ry="8" fill="url(#g_ham_bone_end)" stroke="#bba572" stroke-width="0.8"/>
  <ellipse cx="78" cy="58" rx="4" ry="3" fill="#f7efe0" fill-opacity="0.4"/>
</svg>
