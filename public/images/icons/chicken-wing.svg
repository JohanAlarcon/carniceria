<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g_chicken-wing_skin1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3d5af"/>
      <stop offset="45%" stop-color="#e4be8b"/>
      <stop offset="100%" stop-color="#caa169"/>
    </linearGradient>
    <linearGradient id="g_chicken-wing_skin2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5d8b1"/>
      <stop offset="50%" stop-color="#e7c292"/>
      <stop offset="100%" stop-color="#d1a975"/>
    </linearGradient>
    <radialGradient id="g_chicken-wing_gloss1" cx="35%" cy="28%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g_chicken-wing_gloss2" cx="42%" cy="24%" r="52%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g_chicken-wing_bone1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5e2bb"/>
      <stop offset="50%" stop-color="#e7c7a2"/>
      <stop offset="100%" stop-color="#caa671"/>
    </linearGradient>
    <radialGradient id="g_chicken-wing_bonetip" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#f5e2bb"/>
      <stop offset="100%" stop-color="#d5b885"/>
    </radialGradient>
    <linearGradient id="g_chicken-wing_shadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#714c27" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#5e3b1c" stop-opacity="0.38"/>
    </linearGradient>
    <radialGradient id="g_chicken-wing_vignette" cx="50%" cy="45%" r="58%">
      <stop offset="62%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#3e230e" stop-opacity="0.28"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.0"/>
    </filter>
    <clipPath id="clip_cw_drum">
      <ellipse cx="52" cy="72" rx="22" ry="34" transform="rotate(-30 52 72)"/>
    </clipPath>
    <clipPath id="clip_cw_flat">
      <path d="M62 54 Q80 38 98 42 Q110 46 108 62 Q106 78 88 80 Q72 82 62 70 Z"/>
    </clipPath>
  </defs>

  <!-- Main drumette (thick part) -->
  <ellipse cx="52" cy="72" rx="22" ry="34" transform="rotate(-30 52 72)" fill="url(#g_chicken-wing_skin1)" stroke="#8e572a" stroke-width="1.2"/>
  <!-- Drumette volume shading -->
  <ellipse cx="52" cy="72" rx="22" ry="34" transform="rotate(-30 52 72)" fill="url(#g_chicken-wing_shadow)"/>

  <!-- Marmoleo suave desenfocado (grasa/piel), recortado al drumette -->
  <g clip-path="url(#clip_cw_drum)" filter="url(#soft)" opacity="0.5">
    <path d="M42 62 Q50 58 58 63 Q52 66 46 65 Q42 65 42 62 Z" fill="#f0dab3"/>
    <path d="M44 76 Q52 72 60 77 Q54 81 48 79 Q44 79 44 76 Z" fill="#f3d9b8"/>
    <ellipse cx="50" cy="70" rx="5" ry="2.6" fill="#ebd4ab"/>
    <ellipse cx="56" cy="84" rx="4" ry="2.2" fill="#e7c7a2"/>
  </g>

  <!-- Textura suave de piel en drumette (mate) -->
  <ellipse cx="44" cy="62" rx="5" ry="3.5" transform="rotate(-25 44 62)" fill="#c39862" fill-opacity="0.26"/>
  <ellipse cx="56" cy="70" rx="4.5" ry="3" transform="rotate(-20 56 70)" fill="#c39862" fill-opacity="0.24"/>
  <ellipse cx="48" cy="80" rx="4" ry="3" transform="rotate(-30 48 80)" fill="#bc9253" fill-opacity="0.22"/>
  <ellipse cx="60" cy="58" rx="3.5" ry="2.5" transform="rotate(-15 60 58)" fill="#c8a16e" fill-opacity="0.22"/>

  <!-- Flat wing section -->
  <path d="M62 54 Q80 38 98 42 Q110 46 108 62 Q106 78 88 80 Q72 82 62 70 Z" fill="url(#g_chicken-wing_skin2)" stroke="#8e572a" stroke-width="1.2"/>
  <!-- Flat wing shadow -->
  <path d="M62 54 Q80 38 98 42 Q110 46 108 62 Q106 78 88 80 Q72 82 62 70 Z" fill="url(#g_chicken-wing_shadow)"/>

  <!-- Marmoleo suave desenfocado, recortado al flat wing -->
  <g clip-path="url(#clip_cw_flat)" filter="url(#soft)" opacity="0.5">
    <path d="M72 50 Q82 46 92 51 Q86 55 78 54 Q72 53 72 50 Z" fill="#f0dab3"/>
    <path d="M84 62 Q94 58 102 63 Q96 67 88 65 Q84 65 84 62 Z" fill="#f3d9b8"/>
    <ellipse cx="96" cy="52" rx="5" ry="2.4" fill="#ebd4ab"/>
    <ellipse cx="78" cy="66" rx="4.5" ry="2.2" fill="#e7c7a2"/>
  </g>

  <!-- Textura suave de piel en flat wing (mate) -->
  <ellipse cx="78" cy="52" rx="5" ry="3" transform="rotate(10 78 52)" fill="#c39862" fill-opacity="0.24"/>
  <ellipse cx="92" cy="50" rx="4" ry="2.8" transform="rotate(5 92 50)" fill="#bc9253" fill-opacity="0.22"/>
  <ellipse cx="100" cy="60" rx="4" ry="2.5" transform="rotate(-5 100 60)" fill="#c8a16e" fill-opacity="0.2"/>
  <ellipse cx="84" cy="70" rx="4.5" ry="2.8" transform="rotate(8 84 70)" fill="#c39862" fill-opacity="0.22"/>

  <!-- Bone 1 protruding from drumette bottom -->
  <ellipse cx="37" cy="97" rx="6" ry="10" transform="rotate(20 37 97)" fill="url(#g_chicken-wing_bone1)" stroke="#b39b53" stroke-width="0.8"/>
  <ellipse cx="37" cy="97" rx="6" ry="10" transform="rotate(20 37 97)" fill="url(#g_chicken-wing_bonetip)"/>
  <!-- Bone tip knob 1 -->
  <ellipse cx="32" cy="104" rx="7" ry="5.5" transform="rotate(20 32 104)" fill="url(#g_chicken-wing_bonetip)" stroke="#b39b53" stroke-width="0.8"/>

  <!-- Bone 2 from flat wing tip -->
  <ellipse cx="108" cy="71" rx="5" ry="9" transform="rotate(-60 108 71)" fill="url(#g_chicken-wing_bone1)" stroke="#b39b53" stroke-width="0.8"/>
  <!-- Bone tip knob 2 -->
  <ellipse cx="114" cy="66" rx="6" ry="4.5" transform="rotate(-60 114 66)" fill="url(#g_chicken-wing_bonetip)" stroke="#b39b53" stroke-width="0.7"/>

  <!-- Joint (drumette/flat connection) mate -->
  <ellipse cx="64" cy="63" rx="8" ry="6" fill="#ddb781" fill-opacity="0.35" stroke="#a97e44" stroke-width="0.7"/>
  <ellipse cx="63" cy="61" rx="4" ry="3" fill="#f3daaf" fill-opacity="0.3"/>

  <!-- Vignette (volumen mate) -->
  <ellipse cx="52" cy="72" rx="22" ry="34" transform="rotate(-30 52 72)" fill="url(#g_chicken-wing_vignette)"/>
  <path d="M62 54 Q80 38 98 42 Q110 46 108 62 Q106 78 88 80 Q72 82 62 70 Z" fill="url(#g_chicken-wing_vignette)"/>

  <!-- Sheen mate muy sutil -->
  <ellipse cx="52" cy="72" rx="22" ry="34" transform="rotate(-30 52 72)" fill="url(#g_chicken-wing_gloss1)"/>
  <path d="M62 54 Q80 38 98 42 Q110 46 108 62 Q106 78 88 80 Q72 82 62 70 Z" fill="url(#g_chicken-wing_gloss2)"/>

  <!-- Contorno oscuro fino para definicion -->
  <ellipse cx="52" cy="72" rx="22" ry="34" transform="rotate(-30 52 72)" fill="none" stroke="#603815" stroke-width="1.1" opacity="0.55"/>
  <path d="M62 54 Q80 38 98 42 Q110 46 108 62 Q106 78 88 80 Q72 82 62 70 Z" fill="none" stroke="#603815" stroke-width="1.1" opacity="0.5"/>
</svg>
