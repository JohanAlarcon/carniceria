<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g_chicken-wing_skin1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4A830"/>
      <stop offset="40%" stop-color="#D4781A"/>
      <stop offset="100%" stop-color="#A84F0A"/>
    </linearGradient>
    <linearGradient id="g_chicken-wing_skin2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8C060"/>
      <stop offset="50%" stop-color="#E08820"/>
      <stop offset="100%" stop-color="#B05C0E"/>
    </linearGradient>
    <radialGradient id="g_chicken-wing_gloss1" cx="35%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#FDE090" stop-opacity="0.85"/>
      <stop offset="60%" stop-color="#E09028" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#A05010" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g_chicken-wing_gloss2" cx="40%" cy="25%" r="50%">
      <stop offset="0%" stop-color="#FFF0B0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#D07018" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g_chicken-wing_bone1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5ECD0"/>
      <stop offset="50%" stop-color="#E8D9B0"/>
      <stop offset="100%" stop-color="#C8B880"/>
    </linearGradient>
    <radialGradient id="g_chicken-wing_bonetip" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#FEFAF0"/>
      <stop offset="100%" stop-color="#D0BB80"/>
    </radialGradient>
    <linearGradient id="g_chicken-wing_shadow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7A3008" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#3A1002" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="g_chicken-wing_crisp1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C05808"/>
      <stop offset="100%" stop-color="#E8A030"/>
    </linearGradient>
    <radialGradient id="g_chicken-wing_drumette" cx="45%" cy="38%" r="52%">
      <stop offset="0%" stop-color="#F9C55A"/>
      <stop offset="55%" stop-color="#D07318"/>
      <stop offset="100%" stop-color="#8A3C06"/>
    </radialGradient>
  </defs>

  <!-- Main drumette (thick part) -->
  <ellipse cx="52" cy="72" rx="22" ry="34" transform="rotate(-30 52 72)" fill="url(#g_chicken-wing_skin1)" stroke="#7A3A08" stroke-width="1.2"/>
  <!-- Drumette volume shading -->
  <ellipse cx="52" cy="72" rx="22" ry="34" transform="rotate(-30 52 72)" fill="url(#g_chicken-wing_shadow)"/>
  <!-- Drumette gloss -->
  <ellipse cx="52" cy="72" rx="22" ry="34" transform="rotate(-30 52 72)" fill="url(#g_chicken-wing_gloss1)"/>

  <!-- Crispy texture bumps on drumette -->
  <ellipse cx="44" cy="62" rx="5" ry="3.5" transform="rotate(-25 44 62)" fill="#C06010" fill-opacity="0.45" stroke="#8A4008" stroke-width="0.5"/>
  <ellipse cx="56" cy="70" rx="4.5" ry="3" transform="rotate(-20 56 70)" fill="#C06010" fill-opacity="0.4" stroke="#8A4008" stroke-width="0.5"/>
  <ellipse cx="48" cy="80" rx="4" ry="3" transform="rotate(-30 48 80)" fill="#BA5C0E" fill-opacity="0.38" stroke="#8A4008" stroke-width="0.5"/>
  <ellipse cx="60" cy="58" rx="3.5" ry="2.5" transform="rotate(-15 60 58)" fill="#C86812" fill-opacity="0.35"/>

  <!-- Flat wing section -->
  <path d="M62 54 Q80 38 98 42 Q110 46 108 62 Q106 78 88 80 Q72 82 62 70 Z" fill="url(#g_chicken-wing_skin2)" stroke="#7A3A08" stroke-width="1.2"/>
  <!-- Flat wing shadow -->
  <path d="M62 54 Q80 38 98 42 Q110 46 108 62 Q106 78 88 80 Q72 82 62 70 Z" fill="url(#g_chicken-wing_shadow)"/>
  <!-- Flat wing gloss -->
  <path d="M62 54 Q80 38 98 42 Q110 46 108 62 Q106 78 88 80 Q72 82 62 70 Z" fill="url(#g_chicken-wing_gloss2)"/>

  <!-- Crispy texture bumps on flat wing -->
  <ellipse cx="78" cy="52" rx="5" ry="3" transform="rotate(10 78 52)" fill="#C06010" fill-opacity="0.4" stroke="#8A4008" stroke-width="0.4"/>
  <ellipse cx="92" cy="50" rx="4" ry="2.8" transform="rotate(5 92 50)" fill="#BE5C0C" fill-opacity="0.38" stroke="#8A4008" stroke-width="0.4"/>
  <ellipse cx="100" cy="60" rx="4" ry="2.5" transform="rotate(-5 100 60)" fill="#C06010" fill-opacity="0.35"/>
  <ellipse cx="84" cy="70" rx="4.5" ry="2.8" transform="rotate(8 84 70)" fill="#C26412" fill-opacity="0.38" stroke="#8A4008" stroke-width="0.4"/>

  <!-- Bone 1 protruding from drumette bottom -->
  <ellipse cx="37" cy="97" rx="6" ry="10" transform="rotate(20 37 97)" fill="url(#g_chicken-wing_bone1)" stroke="#B0A060" stroke-width="0.8"/>
  <ellipse cx="37" cy="97" rx="6" ry="10" transform="rotate(20 37 97)" fill="url(#g_chicken-wing_bonetip)"/>
  <!-- Bone tip knob 1 -->
  <ellipse cx="32" cy="104" rx="7" ry="5.5" transform="rotate(20 32 104)" fill="url(#g_chicken-wing_bonetip)" stroke="#B0A060" stroke-width="0.8"/>

  <!-- Bone 2 from flat wing tip -->
  <ellipse cx="108" cy="71" rx="5" ry="9" transform="rotate(-60 108 71)" fill="url(#g_chicken-wing_bone1)" stroke="#B0A060" stroke-width="0.8"/>
  <!-- Bone tip knob 2 -->
  <ellipse cx="114" cy="66" rx="6" ry="4.5" transform="rotate(-60 114 66)" fill="url(#g_chicken-wing_bonetip)" stroke="#B0A060" stroke-width="0.7"/>

  <!-- Joint highlight at drumette/flat connection -->
  <ellipse cx="64" cy="63" rx="8" ry="6" fill="#F0A030" fill-opacity="0.55" stroke="#9A5010" stroke-width="0.7"/>
  <ellipse cx="63" cy="61" rx="4" ry="3" fill="#FDD878" fill-opacity="0.6"/>

  <!-- Final overall crispy brown darkening at edges -->
  <ellipse cx="52" cy="72" rx="22" ry="34" transform="rotate(-30 52 72)" fill="none" stroke="#6A2C06" stroke-width="2" stroke-opacity="0.3"/>
  <path d="M62 54 Q80 38 98 42 Q110 46 108 62 Q106 78 88 80 Q72 82 62 70 Z" fill="none" stroke="#6A2C06" stroke-width="1.8" stroke-opacity="0.28"/>
</svg>