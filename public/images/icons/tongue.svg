<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="g_tongue_base" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#d94f7a"/>
      <stop offset="40%" stop-color="#b83060"/>
      <stop offset="100%" stop-color="#7a1a3a"/>
    </linearGradient>
    <radialGradient id="g_tongue_highlight" cx="0.38" cy="0.22" r="0.45">
      <stop offset="0%" stop-color="#f07fa0" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#c94070" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#c94070" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g_tongue_side_shadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7a1a3a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#4a0a20" stop-opacity="0.55"/>
    </radialGradient>
    <linearGradient id="g_tongue_tip" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#e06080"/>
      <stop offset="100%" stop-color="#9a2548"/>
    </linearGradient>
    <linearGradient id="g_tongue_base_cut" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#6a1530"/>
      <stop offset="50%" stop-color="#a02040"/>
      <stop offset="100%" stop-color="#6a1530"/>
    </linearGradient>
    <radialGradient id="g_tongue_gloss" cx="0.42" cy="0.18" r="0.28">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g_tongue_vein1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8a1a3a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#6a102a" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Main tongue body shape -->
  <path d="
    M 64 16
    C 44 16, 26 28, 22 48
    C 18 62, 20 76, 28 88
    C 36 100, 50 112, 64 114
    C 78 112, 92 100, 100 88
    C 108 76, 110 62, 106 48
    C 102 28, 84 16, 64 16
    Z
  " fill="url(#g_tongue_base)" stroke="#5a0f28" stroke-width="1.5"/>

  <!-- Base cut (cross section at top) -->
  <path d="
    M 38 18
    C 46 12, 56 10, 64 10
    C 72 10, 82 12, 90 18
    C 84 22, 74 24, 64 24
    C 54 24, 44 22, 38 18
    Z
  " fill="url(#g_tongue_base_cut)" stroke="#4a0a20" stroke-width="1"/>

  <!-- Side volume shadow -->
  <path d="
    M 64 16
    C 44 16, 26 28, 22 48
    C 18 62, 20 76, 28 88
    C 36 100, 50 112, 64 114
    C 78 112, 92 100, 100 88
    C 108 76, 110 62, 106 48
    C 102 28, 84 16, 64 16
    Z
  " fill="url(#g_tongue_side_shadow)"/>

  <!-- Center ridge / dorsal line -->
  <path d="
    M 64 20
    C 63 38, 62 58, 62 76
    C 62 92, 63 104, 64 114
  " fill="none" stroke="#9a2548" stroke-width="2" stroke-opacity="0.5" stroke-linecap="round"/>

  <!-- Subtle texture bumps (papillae suggestion) - small ellipses scattered -->
  <ellipse cx="52" cy="52" rx="3" ry="2" fill="#c03060" fill-opacity="0.4"/>
  <ellipse cx="64" cy="48" rx="3" ry="2" fill="#c03060" fill-opacity="0.35"/>
  <ellipse cx="76" cy="52" rx="3" ry="2" fill="#c03060" fill-opacity="0.4"/>
  <ellipse cx="48" cy="66" rx="2.5" ry="1.8" fill="#a82848" fill-opacity="0.4"/>
  <ellipse cx="60" cy="64" rx="2.5" ry="1.8" fill="#a82848" fill-opacity="0.35"/>
  <ellipse cx="72" cy="66" rx="2.5" ry="1.8" fill="#a82848" fill-opacity="0.4"/>
  <ellipse cx="80" cy="64" rx="2.5" ry="1.8" fill="#a82848" fill-opacity="0.35"/>
  <ellipse cx="54" cy="80" rx="2.5" ry="1.8" fill="#a82848" fill-opacity="0.3"/>
  <ellipse cx="66" cy="80" rx="2.5" ry="1.8" fill="#a82848" fill-opacity="0.3"/>
  <ellipse cx="78" cy="80" rx="2.5" ry="1.8" fill="#a82848" fill-opacity="0.3"/>
  <ellipse cx="58" cy="94" rx="2.5" ry="1.8" fill="#a82848" fill-opacity="0.28"/>
  <ellipse cx="70" cy="94" rx="2.5" ry="1.8" fill="#a82848" fill-opacity="0.28"/>

  <!-- Vein detail left -->
  <path d="M 42 35 C 40 50, 35 65, 34 80" fill="none" stroke="#8a1a3a" stroke-width="1.2" stroke-opacity="0.45" stroke-linecap="round"/>
  <!-- Vein detail right -->
  <path d="M 86 35 C 88 50, 93 65, 94 80" fill="none" stroke="#8a1a3a" stroke-width="1.2" stroke-opacity="0.45" stroke-linecap="round"/>

  <!-- Surface highlight (soft gloss on top surface) -->
  <path d="
    M 64 16
    C 44 16, 26 28, 22 48
    C 18 62, 20 76, 28 88
    C 36 100, 50 112, 64 114
    C 78 112, 92 100, 100 88
    C 108 76, 110 62, 106 48
    C 102 28, 84 16, 64 16
    Z
  " fill="url(#g_tongue_highlight)"/>

  <!-- Glossy shine spot -->
  <ellipse cx="50" cy="38" rx="14" ry="9" fill="url(#g_tongue_gloss)"/>

  <!-- Tip rounded detail -->
  <path d="
    M 52 108
    C 55 116, 73 116, 76 108
  " fill="none" stroke="#9a2548" stroke-width="1.5" stroke-opacity="0.5" stroke-linecap="round"/>

</svg>